<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS Pro 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #ffbf00; --pink: #ff69b4; --bg: #0a0a0a; --card-bg: #161616; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        #alert-box { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--pink); color: #000; padding: 10px 20px; border-radius: 50px; font-weight: 800; z-index: 10000; display: none; }

        header { padding: 10px; background: #000; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; }
        
        .container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }

        /* منطقة العرض */
        .display-section { padding: 10px; background: #000; border-bottom: 1px solid #222; }
        .top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-tag { color: var(--green); font-size: 24px; font-weight: 900; }
        
        .order-input-view { background: var(--card-bg); padding: 12px; border-radius: 10px; min-height: 50px; font-size: 20px; color: var(--pink); border: 1px solid #333; margin-bottom: 5px; text-align: right; }

        /* الكيبورد العربي المدمج */
        .custom-keyboard { background: #111; padding: 5px; display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; border-top: 1px solid #333; }
        .key { background: #222; border: 1px solid #333; color: #fff; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 16px; font-weight: bold; }
        .key:active { background: var(--pink); color: #000; }
        .key.wide { grid-column: span 2; background: #333; }
        .key.action { background: var(--gold); color: #000; grid-column: span 2; }
        .key.delete { background: var(--red); grid-column: span 2; }
        .key.space { grid-column: span 4; background: #333; }

        /* أرقام الطاولات */
        .tables-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 10px; background: #000; border-bottom: 1px solid #222; }
        .table-btn { flex: 0 0 50px; height: 50px; border: 1px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .table-btn.selected { background: var(--pink); color: #000; border-color: #fff; }

        /* المطبخ */
        .order-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 2px solid var(--pink); margin: 10px; }
        .btn-done { width: 100%; padding: 15px; background: var(--green); border: none; border-radius: 10px; font-weight: 800; font-size: 20px; }

        #role-selector { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .role-btn { width: 80%; padding: 25px; border-radius: 15px; border: 2px solid var(--pink); background: #000; color: var(--pink); font-size: 22px; font-weight: 800; }
    </style>
</head>
<body>

<div id="alert-box"></div>

<div id="role-selector">
    <h1 style="color:var(--gold)">الجوهرة 💎</h1>
    <button class="role-btn" onclick="init('cashier')">🛒 واجهة الكاشير</button>
    <button class="role-btn" onclick="init('kitchen')">👨‍🍳 واجهة المطبخ</button>
</div>

<header><span>الجوهرة POS Pro</span></header>

<div class="container">
    <div id="cashier" class="view">
        <div class="tables-scroll" id="tables"></div>
        
        <div class="display-section">
            <div class="top-info">
                <span style="color:#888;">الطلب الحالي:</span>
                <div class="price-tag"><span id="total-price">0</span> د.ع</div>
            </div>
            <div class="order-input-view" id="display-text">أبدأ الكتابة...</div>
        </div>

        <div style="flex:1; overflow-y:auto; padding:10px;" id="current-items-list">
            </div>

        <div class="custom-keyboard" id="kb">
            <div class="key" onclick="k('1')">1</div><div class="key" onclick="k('2')">2</div><div class="key" onclick="k('3')">3</div>
            <div class="key" onclick="k('4')">4</div><div class="key" onclick="k('5')">5</div><div class="key" onclick="k('6')">6</div>
            <div class="key" onclick="k('7')">7</div><div class="key" onclick="k('8')">8</div><div class="key" onclick="k('9')">9</div>
            <div class="key" onclick="k('0')">0</div>
            <div class="key" onclick="k('ق')">ق</div><div class="key" onclick="k('ف')">ف</div><div class="key" onclick="k('غ')">غ</div><div class="key" onclick="k('ع')">ع</div><div class="key" onclick="k('ه')">ه</div><div class="key" onclick="k('خ')">خ</div><div class="key" onclick="k('ح')">ح</div><div class="key" onclick="k('ج')">ج</div><div class="key" onclick="k('د')">د</div><div class="key" onclick="k('ش')">ش</div>
            <div class="key" onclick="k('س')">س</div><div class="key" onclick="k('ي')">ي</div><div class="key" onclick="k('ب')">ب</div><div class="key" onclick="k('ل')">ل</div><div class="key" onclick="k('ا')">ا</div><div class="key" onclick="k('ت')">ت</div><div class="key" onclick="k('ن')">ن</div><div class="key" onclick="k('م')">م</div><div class="key" onclick="k('ك')">ك</div><div class="key" onclick="k('ط')">ط</div>
            <div class="key" onclick="k('ئ')">ئ</div><div class="key" onclick="k('ء')">ء</div><div class="key" onclick="k('ؤ')">ؤ</div><div class="key" onclick="k('ر')">ر</div><div class="key" onclick="k('لا')">لا</div><div class="key" onclick="k('ى')">ى</div><div class="key" onclick="k('ة')">ة</div><div class="key" onclick="k('و')">و</div><div class="key" onclick="k('ز')">ز</div><div class="key" onclick="k('ظ')">ظ</div>
            <div class="key delete" onclick="del()">مسح ⌫</div>
            <div class="key space" onclick="k(' ')">مسافة</div>
            <div class="key action" onclick="addToList()">إضافة وجبة +</div>
            <div class="key action" style="background:var(--green)" onclick="sendOrder()">إرسال 🚀</div>
        </div>
    </div>

    <div id="kitchen" class="view">
        <div id="k-list" style="overflow-y:auto;"></div>
    </div>
</div>

<script>
    const bell = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-v80');

    let typing = "", currentOrder = [], total = 0, selectedTable = "";
    let kitchenOrders = [];

    function playTap() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start(); osc.stop(ctx.currentTime + 0.05);
    }

    function init(r) {
        document.getElementById('role-selector').style.display = 'none';
        if(r === 'cashier') {
            document.getElementById('cashier').classList.add('active');
            genTables();
        } else {
            document.getElementById('kitchen').classList.add('active');
            renderKitchen();
        }
        // تحميل البيانات المخزنة لمنع الضياع عند الترسيت
        kitchenOrders = JSON.parse(localStorage.getItem('j_kitchen') || '[]');
        if(r === 'kitchen') renderKitchen();
    }

    function genTables() {
        const t = document.getElementById('tables');
        for(let i=1; i<=30; i++) {
            const b = document.createElement('div');
            b.className = 'table-btn'; b.innerText = i;
            b.onclick = function() { 
                playTap();
                document.querySelectorAll('.table-btn').forEach(x => x.classList.remove('selected'));
                this.classList.add('selected'); selectedTable = i;
            };
            t.appendChild(b);
        }
    }

    function k(char) {
        playTap();
        if(typing === "أبدأ الكتابة...") typing = "";
        typing += char;
        document.getElementById('display-text').innerText = typing;
    }

    function del() {
        playTap();
        typing = typing.slice(0, -1);
        document.getElementById('display-text').innerText = typing || "أبدأ الكتابة...";
    }

    function addToList() {
        playTap();
        if(!typing || typing === "أبدأ الكتابة...") return;
        
        // استخراج السعر لو كتبه (مثلاً: برجر 5000)
        let priceMatch = typing.match(/\d+/);
        let p = priceMatch ? parseInt(priceMatch[0]) : 0;
        
        currentOrder.push(typing);
        total += p;
        
        const item = document.createElement('div');
        item.style = "background:#222; padding:10px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between;";
        item.innerHTML = `<span>${typing}</span><b style="color:var(--gold)">${p.toLocaleString()}</b>`;
        document.getElementById('current-items-list').prepend(item);
        
        document.getElementById('total-price').innerText = total.toLocaleString();
        typing = "";
        document.getElementById('display-text').innerText = "أبدأ الكتابة...";
    }

    function sendOrder() {
        playTap();
        if(!selectedTable || currentOrder.length === 0) { alert("اختر طاولة وضف وجبة!"); return; }
        channel.publish('msg', { table: selectedTable, items: currentOrder.join(' - ') });
        clearAll();
        bell.play().catch(()=>{});
    }

    function clearAll() {
        currentOrder = []; total = 0; typing = ""; selectedTable = "";
        document.getElementById('total-price').innerText = "0";
        document.getElementById('display-text').innerText = "أبدأ الكتابة...";
        document.getElementById('current-items-list').innerHTML = "";
        document.querySelectorAll('.table-btn').forEach(x => x.classList.remove('selected'));
    }

    channel.subscribe(msg => {
        if(!msg.data.type) {
            kitchenOrders.push(msg.data);
            localStorage.setItem('j_kitchen', JSON.stringify(kitchenOrders));
            renderKitchen();
            bell.play().catch(()=>{});
        }
    });

    function renderKitchen() {
        const list = document.getElementById('k-list');
        if(!list) return;
        list.innerHTML = "";
        kitchenOrders.forEach((o, i) => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `<div style="font-size:20px; color:var(--gold)">طاولة ${o.table}</div><div style="font-size:26px; margin:10px 0;">${o.items}</div><button class="btn-done" onclick="done(${i})">تم التجهيز ✅</button>`;
            list.prepend(card);
        });
    }

    function done(i) {
        playTap();
        kitchenOrders.splice(i, 1);
        localStorage.setItem('j_kitchen', JSON.stringify(kitchenOrders));
        renderKitchen();
    }
</script>
</body>
</html>
