<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الجوهرة الملكي | الإصدار المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-black: #0d0d0d;
            --gold: #d4af37;
            --gold-light: #f1d592;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--royal-black);
            display: grid;
            grid-template-columns: 350px 1fr 400px; /* ترتيب: الفاتورة | المنيو | المطبخ */
            height: 100vh;
            color: var(--white);
            overflow: hidden;
        }

        /* --- الهيدر المشترك --- */
        .panel-header {
            background: linear-gradient(145deg, #1a1a1a, #000);
            color: var(--gold);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            font-weight: bold;
            font-size: 18px;
        }

        /* --- 1. قسم الفاتورة (اليمين) --- */
        #bill-panel {
            background: var(--white);
            color: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        /* ✨ الختم الشفاف الملكي ✨ */
        #bill-panel::before {
            content: "مطعم الجوهرة";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 50px;
            color: rgba(0, 0, 0, 0.04);
            border: 4px solid rgba(0, 0, 0, 0.04);
            padding: 10px;
            font-weight: bold;
            pointer-events: none;
            z-index: 0;
        }

        .bill-content { position: relative; z-index: 1; flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .order-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 8px 0; font-weight: 600; }
        .total-box { border-top: 3px double #000; margin-top: auto; padding-top: 15px; }
        
        .btn-print {
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            color: #000; border: none; padding: 15px;
            font-size: 18px; font-weight: bold; border-radius: 8px;
            cursor: pointer; width: 100%; margin-top: 10px;
        }

        /* --- 2. قسم المنيو (الوسط) --- */
        #menu-panel { border-left: 1px solid #333; border-right: 1px solid #333; overflow-y: auto; padding: 20px; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .food-card {
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .food-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #222; }
        .food-card h4 { color: var(--gold); margin: 10px 0 5px; }
        .food-card p { color: #fff; font-weight: bold; }

        /* --- 3. قسم المطبخ (اليسار) --- */
        #kitchen-panel { background: #000; overflow-y: auto; padding: 10px; border-right: 2px solid var(--gold); }
        .kitchen-card {
            background: #1a1a1a; border: 1px solid var(--gold);
            border-radius: 10px; padding: 15px; margin-bottom: 15px;
            animation: borderGlow 2s infinite;
        }
        @keyframes borderGlow { 0% { box-shadow: 0 0 5px #d4af37; } 50% { box-shadow: 0 0 15px #d4af37; } 100% { box-shadow: 0 0 5px #d4af37; } }
        .btn-ready { background: #2ed573; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* التنبيهات */
        #status-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 30px; border-radius: 50px; font-weight: bold; display: none; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* الطباعة */
        @media print {
            body * { visibility: hidden; }
            #bill-panel, #bill-panel * { visibility: visible; }
            #bill-panel { position: absolute; left: 0; top: 0; width: 80mm; }
            .btn-print { display: none; }
        }
    </style>
</head>
<body>

    <div id="bill-panel">
        <div class="panel-header" style="background:#fff; color:#000;">وصل الزبون 🧾</div>
        <div class="bill-content">
            <center>
                <h2 style="margin:0">مطعم الجوهرة</h2>
                <small>أطيب المأكولات الملكية</small>
                <p style="font-size:10px">النجف - الكوفة</p>
            </center>
            <div id="current-items" style="margin-top:20px;">
                </div>
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:bold;">
                    <span>المجموع:</span>
                    <span id="total-price">0 د.ع</span>
                </div>
                <button class="btn-print" onclick="processOrder()">إرسال للمطبخ وطباعة 🖨️</button>
            </div>
        </div>
    </div>

    <div id="menu-panel">
        <div class="panel-header">💎 قائمة الطعام (الكاشير)</div>
        <div class="food-grid" style="margin-top:20px;">
            <div class="food-card" onclick="add('برجر لحم', 7500)"><h4>🍔 برجر لحم</h4><p>7,500</p></div>
            <div class="food-card" onclick="add('زنكر دجاج', 6500)"><h4>🍗 زنكر دجاج</h4><p>6,500</p></div>
            <div class="food-card" onclick="add('ستربس 5 قطع', 8000)"><h4>🍟 ستربس</h4><p>8,000</p></div>
            <div class="food-card" onclick="add('صاج دجاج', 5000)"><h4>🌯 صاج دجاج</h4><p>5,000</p></div>
            <div class="food-card" onclick="add('صاج لحم', 6000)"><h4>🌯 صاج لحم</h4><p>6,000</p></div>
            <div class="food-card" onclick="add('بيبسي بارد', 500)"><h4>🥤 بيبسي</h4><p>500</p></div>
        </div>
    </div>

    <div id="kitchen-panel">
        <div class="panel-header">👨‍🍳 شاشة التحضير (المطبخ)</div>
        <div id="kitchen-queue" style="margin-top:10px;">
            </div>
    </div>

    <div id="status-bar"></div>

    <script>
        let bill = [];
        let kitchenOrders = [];

        // إضافة صنف للفاتورة
        function add(name, price) {
            bill.push({name, price});
            updateBill();
        }

        function updateBill() {
            const list = document.getElementById('current-items');
            list.innerHTML = '';
            let total = 0;
            bill.forEach((item, idx) => {
                total += item.price;
                list.innerHTML += `<div class="order-item"><span>${item.name}</span> <b>${item.price.toLocaleString()}</b></div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString() + " د.ع";
        }

        // إرسال الطلب للمطبخ
        function processOrder() {
            if (bill.length === 0) return;

            const orderId = Math.floor(100 + Math.random() * 900);
            const orderData = { id: orderId, items: [...bill] };
            
            // إضافة الطلب لشاشة المطبخ
            kitchenOrders.push(orderData);
            renderKitchen();

            // طباعة الوصل
            window.print();

            // تصفير الفاتورة
            bill = [];
            updateBill();
        }

        // تحديث شاشة المطبخ
        function renderKitchen() {
            const queue = document.getElementById('kitchen-queue');
            queue.innerHTML = '';
            kitchenOrders.forEach((order, idx) => {
                queue.innerHTML += `
                    <div class="kitchen-card">
                        <div style="color:var(--gold); font-weight:bold; border-bottom:1px solid #333; margin-bottom:10px;">طلب جديد #${order.id}</div>
                        <ul style="padding-right:15px; font-size:14px;">
                            ${order.items.map(i => `<li>${i.name}</li>`).join('')}
                        </ul>
                        <button class="btn-ready" onclick="completeOrder(${idx})">تم التحضير ✅</button>
                    </div>
                `;
            });
        }

        // إكمال الطلب وإرسال خبر للكاشير
        function completeOrder(index) {
            const order = kitchenOrders[index];
            showStatus(`🔔 الطلب #${order.id} جاهز للتسليم!`);
            
            // تشغيل صوت تنبيه
            const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            audio.play();

            kitchenOrders.splice(index, 1);
            renderKitchen();
        }

        // إظهار التنبيه للكاشير
        function showStatus(msg) {
            const bar = document.getElementById('status-bar');
            bar.innerText = msg;
            bar.style.display = 'block';
            setTimeout(() => { bar.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
