<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #ffffff; --red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* شريط التنبيه العلوي (بديل الـ Alert) */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 35px; border-radius: 50px; font-weight: bold; z-index: 2000; transition: 0.5s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #toast.show { top: 20px; }

        header { padding: 15px; background: #000; text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 18px; }
        
        .nav-bar { display: flex; background: #111; padding: 5px; position: relative; border-bottom: 1px solid #222; }
        .nav-item { flex: 1; padding: 15px; border: none; background: transparent; color: #666; font-weight: bold; position: relative; font-size: 14px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: var(--gold); border-radius: 10px; }

        /* العلامة الرقمية (الإشعار الأحمر) */
        .badge { position: absolute; top: 8px; right: 12px; background: var(--red); color: white; font-size: 11px; padding: 2px 7px; border-radius: 50%; display: none; font-weight: bold; border: 1px solid #000; }

        .container { flex: 1; overflow-y: auto; padding: 15px; background: radial-gradient(circle at center, #151515, #0a0a0a); }
        .view { display: none; }
        .view.active { display: block; }

        /* الكاشير */
        input#tabNum { width: 100%; background: #000; border: 2px solid #333; color: var(--gold); padding: 15px; border-radius: 15px; text-align: center; font-size: 26px; margin-bottom: 15px; outline: none; font-weight: bold; }
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item-btn { background: #1a1a1a; border: 1px solid #333; padding: 22px 5px; border-radius: 15px; text-align: center; font-size: 13px; font-weight: bold; color: #ddd; transition: 0.1s; }
        .item-btn:active { background: var(--gold); color: black; transform: scale(0.9); }
        #tempText { background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 15px; margin: 15px 0; color: var(--gold); text-align: center; font-weight: bold; border: 1px dashed #444; min-height: 56px; font-size: 18px; }
        .btn-send { width: 100%; padding: 20px; border-radius: 18px; border: none; font-size: 20px; font-weight: bold; background: var(--gold); color: black; cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        /* كروت المطبخ */
        .order-card { background: var(--card); color: black; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-right: 12px solid var(--gold); animation: slideIn 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } }
        .items-display { font-size: 26px; font-weight: 900; color: #000; margin: 12px 0; line-height: 1.3; }
        .btn-done { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="toast">تم الإرسال للمطبخ 🚀</div>

<header>الجوهرة POS 💎</header>

<div class="nav-bar">
    <button id="n-cashier" class="nav-item active" onclick="showV('cashier')">🛒 الكاشير</button>
    <button id="n-kitchen" class="nav-item" onclick="showV('kitchen')">👨‍🍳 المطبخ</button>
    <button id="n-ready" class="nav-item" onclick="showV('ready')">✅ الجاهز <span id="ready-badge" class="badge">0</span></button>
</div>

<div class="container">
    <div id="cashier" class="view active">
        <input type="number" id="tabNum" placeholder="رقم الطاولة" inputmode="numeric">
        <div class="pos-grid">
            <div class="item-btn" onclick="add('ستربس')">🍗 ستربس</div>
            <div class="item-btn" onclick="add('برجر')">🍔 برجر</div>
            <div class="item-btn" onclick="add('كنتاكي')">🍗 كنتاكي</div>
            <div class="item-btn" onclick="add('صاج')">🌯 صاج</div>
            <div class="item-btn" onclick="add('بيتزا')">🍕 بيتزا</div>
            <div class="item-btn" onclick="add('فنجر')">🍟 فنجر</div>
            <div class="item-btn" style="color:#3498db" onclick="add('بيبسي')">🥤 بيبسي</div>
            <div class="item-btn" style="color:#3498db" onclick="add('ماء')">💧 ماء</div>
            <div class="item-btn" style="color:var(--red)" onclick="resetPOS()">❌ مسح</div>
        </div>
        <div id="tempText">بانتظار الطلبات...</div>
        <button class="btn-send" onclick="sendOrder()">إرسال للمطبخ 🚀</button>
    </div>

    <div id="kitchen" class="view"><div id="k-list"></div></div>
    <div id="ready" class="view"><div id="r-list"></div></div>
</div>

<script>
    // الأصوات القديمة (المحبوبة)
    const sndIn = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); // جرس المطبخ
    const sndOut = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'); // صوت الإرسال/الجاهز

    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-final-v10');
    
    let orderID = 1, currentOrder = [], readyCount = 0;

    function add(item) {
        currentOrder.push(item);
        document.getElementById('tempText').innerText = currentOrder.join(' + ');
        // حركة لفتح الصوت في المتصفح
        sndOut.play().then(() => sndOut.pause()).catch(()=>{});
    }

    function sendOrder() {
        const table = document.getElementById('tabNum').value;
        if(!table || currentOrder.length === 0) return;

        channel.publish('order', { id: orderID++, table: table, items: currentOrder.join(' - ') });
        
        sndOut.play().catch(()=>{});
        showToast("تم الإرسال للمطبخ ✨");
        resetPOS();
    }

    channel.subscribe((msg) => {
        if(msg.name === 'order') {
            render(msg.data, 'k');
            if(document.getElementById('kitchen').classList.contains('active')) sndIn.play().catch(()=>{});
        } else if(msg.name === 'ready') {
            render(msg.data, 'r');
            readyCount++;
            updateBadge();
            if(document.getElementById('cashier').classList.contains('active')) sndOut.play().catch(()=>{});
        }
    });

    function render(data, target) {
        const list = document.getElementById(target + '-list');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #f0f0f0; padding-bottom:8px;">
                <span style="background:black; color:var(--gold); padding:3px 10px; border-radius:8px; font-weight:bold;">#${data.id}</span>
                <span style="font-weight:bold; font-size:20px;">طاولة ${data.table}</span>
            </div>
            <div class="items-display">${data.items}</div>
            ${target === 'k' 
                ? `<button class="btn-done" onclick="markReady(this, ${JSON.stringify(data).replace(/"/g, '&quot;')})">تم التجهيز ✅</button>`
                : `<button class="btn-done" style="background:#444" onclick="deliver(this)">تسليم 🏁</button>`
            }
        `;
        list.prepend(card);
    }

    function markReady(btn, data) {
        channel.publish('ready', data);
        btn.parentElement.remove();
    }

    function deliver(btn) {
        btn.parentElement.remove();
        readyCount = Math.max(0, readyCount - 1);
        updateBadge();
    }

    function updateBadge() {
        const b = document.getElementById('ready-badge');
        if(readyCount > 0) {
            b.innerText = readyCount;
            b.style.display = 'block';
        } else {
            b.style.display = 'none';
        }
    }

    function resetPOS() {
        currentOrder = [];
        document.getElementById('tempText').innerText = "تم الإرسال بنجاح ✅";
        document.getElementById('tabNum').value = '';
        setTimeout(() => { document.getElementById('tempText').innerText = "بانتظار الطلبات..."; }, 2000);
    }

    function showToast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt;
        t.className = 'show';
        setTimeout(() => t.className = '', 2500);
    }

    function showV(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        document.getElementById('n-' + v).classList.add('active');
    }
</script>
</body>
</html>
