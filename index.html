<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS الاحترافي 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #0d0d0d; --bg: #0a0a0a; --green: #2ecc71; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* الخلفية المتحركة */
        #bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); overflow: hidden; }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.3; animation: float 15s infinite linear; }
        @keyframes float { from { transform: translateY(100vh) scale(0); } to { transform: translateY(-10vh) scale(1); } }

        header { padding: 12px 20px; background: rgba(26, 26, 26, 0.9); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); backdrop-filter: blur(5px); }
        .nav-bar { display: flex; background: rgba(26, 26, 26, 0.8); padding: 5px; gap: 5px; }
        .nav-item { flex: 1; padding: 12px; border: none; background: transparent; color: #777; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; transition: 0.3s; }
        .nav-item.active { background: var(--gold); color: black; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

        .container { flex: 1; overflow-y: auto; padding: 15px; z-index: 1; }
        .view { display: none; }
        .view.active { display: block; }

        /* واجهة الكاشير */
        input#tabNum { width: 100%; background: rgba(0,0,0,0.6); border: 2px solid var(--gold); color: white; padding: 15px; border-radius: 15px; text-align: center; font-size: 24px; margin-bottom: 15px; font-weight: bold; outline: none; }
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item-btn { background: rgba(34, 34, 34, 0.8); border: 1px solid #444; padding: 20px 5px; border-radius: 15px; text-align: center; font-size: 14px; font-weight: bold; transition: 0.1s; backdrop-filter: blur(5px); }
        .item-btn:active { background: var(--gold); color: black; transform: scale(0.9); }

        .order-summary { background: rgba(26, 26, 26, 0.9); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #tempOrder { color: var(--gold); min-height: 40px; margin-bottom: 15px; font-size: 18px; font-weight: bold; }

        /* الإشعارات */
        #notification { display: none; position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%); background: var(--gold); color: black; padding: 15px 40px; border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }

        /* الكروت */
        .card { background: white; color: black; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-right: 15px solid var(--gold); animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } }
        .items-list { font-size: 26px; font-weight: 900; line-height: 1.3; margin: 15px 0; color: #000; }
        .btn-ready { width: 100%; background: var(--green); color: white; padding: 15px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
    </style>
</head>
<body>

<div id="bg-animation"></div>

<div id="notification">تم الإرسال بنجاح 🚀</div>

<header>
    <span>الجوهرة POS 💎</span>
    <span style="color: var(--green); font-size: 12px;">● نظام سحابي</span>
</header>

<div class="nav-bar">
    <button class="nav-item active" onclick="showView('cashier', this)">🛒 الكاشير</button>
    <button class="nav-item" onclick="showView('kitchen', this)">👨‍🍳 المطبخ</button>
    <button class="nav-item" onclick="showView('ready', this)">✅ الجاهز</button>
</div>

<div class="container">
    <div id="cashier" class="view active">
        <input type="number" id="tabNum" placeholder="رقم الطاولة" inputmode="numeric">
        <div class="pos-grid">
            <div class="item-btn" onclick="addItem('ستربس')">🍗 ستربس</div>
            <div class="item-btn" onclick="addItem('برجر')">🍔 برجر</div>
            <div class="item-btn" onclick="addItem('كنتاكي')">🍗 كنتاكي</div>
            <div class="item-btn" onclick="addItem('صاج')">🌯 صاج</div>
            <div class="item-btn" onclick="addItem('بيتزا')">🍕 بيتزا</div>
            <div class="item-btn" onclick="addItem('فنجر')">🍟 فنجر</div>
            <div class="item-btn" style="color:#3498db" onclick="addItem('بيبسي')">🥤 بيبسي</div>
            <div class="item-btn" style="color:#3498db" onclick="addItem('ماء')">💧 ماء</div>
            <div class="item-btn" style="color:#e74c3c" onclick="clearUI()">❌ مسح</div>
        </div>
        <div class="order-summary">
            <div id="tempOrder">أختر الوجبات...</div>
            <button class="btn-ready" style="background:var(--gold); color:black;" onclick="sendToKitchen()">إرسال للمطبخ 🚀</button>
        </div>
    </div>
    <div id="kitchen" class="view">
        <div id="kitchen-list"></div>
    </div>
    <div id="ready" class="view">
        <div id="ready-list"></div>
    </div>
</div>

<script>
    // --- الأصوات المخصصة ---
    const sndSend = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'); // صوت طيران
    const sndNewOrder = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3'); // جرس مطبخ
    const sndSuccess = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'); // صوت نجاح

    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-v4');
    
    let orderNum = 1;
    let currentItems = [];

    // إنشاء الجزيئات المتحركة
    for(let i=0; i<20; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = Math.random() * 5 + 2 + 'px';
        p.style.animationDelay = Math.random() * 10 + 's';
        document.getElementById('bg-animation').appendChild(p);
    }

    function addItem(item) {
        currentItems.push(item);
        document.getElementById('tempOrder').innerText = currentItems.join(' + ');
    }

    function sendToKitchen() {
        const table = document.getElementById('tabNum').value;
        if(!table || currentItems.length === 0) return alert("أكمل الطلب!");

        channel.publish('new-order', {
            id: orderNum++,
            table: table,
            items: currentItems.join(' - '),
            time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})
        });

        sndSend.play();
        document.getElementById('notification').style.display = 'block';
        setTimeout(() => document.getElementById('notification').style.display = 'none', 1500);
        clearUI();
    }

    channel.subscribe((msg) => {
        if(msg.name === 'new-order') {
            renderCard(msg.data, 'kitchen');
            if(document.getElementById('kitchen').classList.contains('active')) sndNewOrder.play();
        } else if(msg.name === 'order-ready') {
            renderCard(msg.data, 'ready');
            if(document.getElementById('ready').classList.contains('active')) sndSuccess.play();
        }
    });

    function renderCard(data, target) {
        const list = document.getElementById(target + '-list');
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="background:black; color:var(--gold); padding:5px 10px; border-radius:8px; font-weight:bold;">#${data.id}</span>
                <span style="font-size:20px; font-weight:bold;">🪑 طاولة ${data.table}</span>
            </div>
            <div class="items-list">${data.items}</div>
            ${target === 'kitchen' 
                ? `<button class="btn-ready" onclick="markDone(this, ${JSON.stringify(data).replace(/"/g, '&quot;')})">تم التحضير ✅</button>`
                : `<button class="btn-ready" style="background:#333" onclick="this.parentElement.remove()">تسليم واستلام 🏁</button>`
            }
        `;
        list.prepend(card);
    }

    function markDone(btn, data) {
        channel.publish('order-ready', data);
        btn.parentElement.remove();
    }

    function clearUI() {
        currentItems = [];
        document.getElementById('tempOrder').innerText = "أختر الوجبات...";
        document.getElementById('tabNum').value = '';
    }

    function showView(v, btn) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
