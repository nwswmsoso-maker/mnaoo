<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #ffffff; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* تنبيه الإرسال */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 30px; border-radius: 50px; font-weight: bold; z-index: 2000; transition: 0.5s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #toast.show { top: 20px; }

        header { padding: 15px; background: #000; text-align: center; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        
        .nav-bar { display: flex; background: #111; padding: 5px; gap: 5px; }
        .nav-item { flex: 1; padding: 12px; border: none; background: transparent; color: #555; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .nav-item.active { background: var(--gold); color: black; }

        .container { flex: 1; overflow-y: auto; padding: 15px; background: #0a0a0a; }
        .view { display: none; }
        .view.active { display: block; }

        /* الكاشير */
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .item-btn { background: #1a1a1a; border: 1px solid #333; padding: 20px 5px; border-radius: 12px; text-align: center; font-size: 14px; font-weight: bold; color: #ccc; }
        .item-btn:active { background: var(--gold); color: black; }
        
        input#tabNum { width: 100%; background: #000; border: 2px solid #333; color: var(--gold); padding: 15px; border-radius: 12px; text-align: center; font-size: 24px; margin-bottom: 10px; outline: none; }
        #tempText { background: #111; padding: 15px; border-radius: 10px; margin: 15px 0; min-height: 50px; color: var(--gold); text-align: center; font-weight: bold; border: 1px dashed #333; }

        .btn-send { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 20px; font-weight: bold; background: var(--gold); color: black; cursor: pointer; }

        /* المطبخ */
        .order-card { background: var(--card); color: black; border-radius: 15px; padding: 20px; margin-bottom: 20px; border-right: 12px solid var(--gold); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } }
        .card-header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .order-id { background: #000; color: var(--gold); padding: 2px 10px; border-radius: 5px; font-weight: bold; }
        .items-display { font-size: 26px; font-weight: 900; color: #000; line-height: 1.2; margin: 10px 0; }
        .btn-done { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; }

        /* زر تفعيل الصوت */
        #audio-fix { background: #c0392b; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; border: none; }
    </style>
</head>
<body>

<div id="toast">تم الإرسال للمطبخ 🚀</div>

<header>
    <button id="audio-fix" onclick="enableAudio()">🔊 تفعيل التنبيه</button>
    <span>الجوهرة POS</span>
    <span style="font-size: 10px; color: #28a745;">● متصل</span>
</header>

<div class="nav-bar">
    <button id="nav-cashier" class="nav-item active" onclick="showV('cashier')">🛒 الكاشير</button>
    <button id="nav-kitchen" class="nav-item" onclick="showV('kitchen')">👨‍🍳 المطبخ</button>
    <button id="nav-ready" class="nav-item" onclick="showV('ready')">✅ الجاهز</button>
</div>

<div class="container">
    <div id="cashier" class="view active">
        <input type="number" id="tabNum" placeholder="رقم الطاولة" inputmode="numeric">
        <div class="pos-grid">
            <div class="item-btn" onclick="add('ستربس')">🍗 ستربس</div>
            <div class="item-btn" onclick="add('برجر')">🍔 برجر</div>
            <div class="item-btn" onclick="add('كنتاكي')">🍗 كنتاكي</div>
            <div class="item-btn" onclick="add('صاج')">🌯 صاج</div>
            <div class="item-btn" onclick="add('بيتزا')">🍕 بيتزا</div>
            <div class="item-btn" onclick="add('فنجر')">🍟 فنجر</div>
            <div class="item-btn" onclick="add('بيبسي')">🥤 بيبسي</div>
            <div class="item-btn" onclick="add('ماء')">💧 ماء</div>
            <div class="item-btn" style="color: #e74c3c" onclick="resetPOS()">❌ مسح</div>
        </div>
        <div id="tempText">أختر الطلبات...</div>
        <button class="btn-send" onclick="sendOrder()">إرسال للمطبخ 🚀</button>
    </div>

    <div id="kitchen" class="view">
        <div id="kitchen-list"></div>
    </div>

    <div id="ready" class="view">
        <div id="ready-list"></div>
    </div>
</div>

<script>
    // أصوات نظام خفيفة
    const sndSend = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');
    const sndIn = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');

    // تفعيل الصوت (ضروري جداً للمتصفح)
    function enableAudio() {
        sndIn.play().then(() => {
            document.getElementById('audio-fix').style.background = '#28a745';
            document.getElementById('audio-fix').innerText = '✅ الصوت يعمل';
        });
    }

    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-final-v1'); // قناة جديدة نظيفة
    
    let orderID = 1, currentOrder = [];

    function add(item) {
        currentOrder.push(item);
        document.getElementById('tempText').innerText = currentOrder.join(' + ');
    }

    function sendOrder() {
        const table = document.getElementById('tabNum').value;
        if(!table || currentOrder.length === 0) return alert("أكمل البيانات!");

        channel.publish('order-msg', {
            id: orderID++,
            table: table,
            items: currentOrder.join(' - '),
            time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})
        });

        sndSend.play().catch(()=>{});
        showToast();
        resetPOS();
    }

    channel.subscribe((msg) => {
        if(msg.name === 'order-msg') {
            render(msg.data, 'kitchen');
            // يشغل الصوت فقط إذا كان الموبايل بوضع "المطبخ"
            if(document.getElementById('kitchen').classList.contains('active')) {
                sndIn.play().catch(()=>{});
            }
        } else if(msg.name === 'ready-msg') {
            render(msg.data, 'ready');
        }
    });

    function render(data, target) {
        const list = document.getElementById(target + '-list');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div class="card-header">
                <span class="order-id">#${data.id}</span>
                <span style="font-weight:bold; font-size:18px;">🪑 طاولة ${data.table}</span>
            </div>
            <div class="items-display">${data.items}</div>
            <div style="text-align:left; color:#888; font-size:12px; margin-bottom:10px;">🕒 ${data.time}</div>
            ${target === 'kitchen' 
                ? `<button class="btn-done" onclick="markReady(this, ${JSON.stringify(data).replace(/"/g, '&quot;')})">تم التجهيز ✅</button>`
                : `<button class="btn-done" style="background:#555" onclick="this.parentElement.remove()">تسليم 🏁</button>`
            }
        `;
        list.prepend(card);
    }

    function markReady(btn, data) {
        channel.publish('ready-msg', data);
        btn.parentElement.remove();
    }

    function resetPOS() {
        currentOrder = [];
        document.getElementById('tempText').innerText = "أختر الطلبات...";
        document.getElementById('tabNum').value = '';
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.className = 'show';
        setTimeout(() => t.className = '', 2000);
    }

    function showV(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        document.getElementById('nav-' + v).classList.add('active');
        // عند التبديل للمطبخ يفرغ القديم حتى لا تتراكم الطلبات
        if(v === 'kitchen') {
            // هنا يمكنك ترك الطلبات أو مسحها حسب رغبتك
        }
    }
</script>
</body>
</html>
