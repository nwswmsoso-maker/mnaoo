<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS الاحترافي 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #0d0d0d; --bg: #121212; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* الهيدر */
        header { padding: 12px 20px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .status-badge { font-size: 11px; color: var(--green); }

        /* التنقل */
        .nav-bar { display: flex; background: #1a1a1a; padding: 5px; gap: 5px; }
        .nav-item { flex: 1; padding: 12px; border: none; background: transparent; color: #777; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .nav-item.active { background: var(--gold); color: black; }

        .container { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .view { display: none; }
        .view.active { display: block; }

        /* واجهة الكاشير */
        input#tabNum { width: 100%; background: #000; border: 2px solid var(--gold); color: white; padding: 15px; border-radius: 12px; text-align: center; font-size: 22px; margin-bottom: 15px; font-weight: bold; }
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item-btn { background: #222; border: 1px solid #333; padding: 18px 5px; border-radius: 15px; text-align: center; font-size: 14px; font-weight: bold; transition: 0.1s; }
        .item-btn:active { background: var(--gold); color: black; transform: scale(0.9); }

        .order-summary { background: #1a1a1a; border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid #333; text-align: center; }
        #tempOrder { color: var(--gold); min-height: 40px; margin-bottom: 15px; font-size: 18px; font-weight: bold; }

        /* إشعار الإرسال */
        #notification { display: none; position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: var(--gold); color: black; padding: 20px 40px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: translate(-50%, 0%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        /* كارت المطبخ */
        .card { background: white; color: black; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-right: 15px solid var(--gold); animation: slide 0.4s ease; }
        @keyframes slide { from { opacity: 0; transform: translateX(30px); } }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .order-no { background: black; color: var(--gold); padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 18px; }
        .items-list { font-size: 24px; font-weight: 800; line-height: 1.4; margin: 15px 0; color: #000; }
        .btn-ready { width: 100%; background: var(--green); color: white; padding: 15px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div id="notification">تم الإرسال للمطبخ 🚀</div>

<header>
    <span>الجوهرة POS 💎</span>
    <div class="status-badge">● السحاب متصل</div>
</header>

<div class="nav-bar">
    <button class="nav-item active" onclick="showView('cashier', this)">🛒 الكاشير</button>
    <button class="nav-item" onclick="showView('kitchen', this)">👨‍🍳 المطبخ</button>
    <button class="nav-item" onclick="showView('ready', this)">✅ الجاهز</button>
</div>

<div class="container">
    <div id="cashier" class="view active">
        <input type="number" id="tabNum" placeholder="رقم الطاولة 🪑" inputmode="numeric">
        <div class="pos-grid">
            <div class="item-btn" onclick="addItem('وجبة ستربس')">🍗 ستربس</div>
            <div class="item-btn" onclick="addItem('وجبة برجر')">🍔 برجر</div>
            <div class="item-btn" onclick="addItem('كنتاكي')">🍗 كنتاكي</div>
            <div class="item-btn" onclick="addItem('صاج دجاج')">🌯 صاج</div>
            <div class="item-btn" onclick="addItem('بيتزا')">🍕 بيتزا</div>
            <div class="item-btn" onclick="addItem('فنجر')">🍟 فنجر</div>
            <div class="item-btn" style="color:#3498db" onclick="addItem('بيبسي')">🥤 بيبسي</div>
            <div class="item-btn" style="color:#3498db" onclick="addItem('ماء')">💧 ماء</div>
            <div class="item-btn" style="color:#e74c3c" onclick="clearUI()">❌ مسح</div>
        </div>
        <div class="order-summary">
            <div id="tempOrder">أختر الطلبات...</div>
            <button class="btn-ready" style="background:var(--gold); color:black;" onclick="sendToKitchen()">إرسال الطلب الآن 🚀</button>
        </div>
    </div>

    <div id="kitchen" class="view">
        <div id="kitchen-list"></div>
    </div>

    <div id="ready" class="view">
        <div id="ready-list"></div>
    </div>
</div>

<script>
    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-v3');
    
    let orderNum = 1;
    let currentItems = [];
    const sndSend = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
    const sndKitchen = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    function addItem(item) {
        currentItems.push(item);
        document.getElementById('tempOrder').innerText = currentItems.join(' + ');
    }

    function sendToKitchen() {
        const table = document.getElementById('tabNum').value;
        if(!table || currentItems.length === 0) return alert("أكمل البيانات!");

        channel.publish('new-order', {
            id: orderNum++,
            table: table,
            items: currentItems.join(' - '),
            time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})
        });

        // تأثيرات الإرسال
        sndSend.play();
        const notify = document.getElementById('notification');
        notify.style.display = 'block';
        setTimeout(() => notify.style.display = 'none', 1500);
        
        clearUI();
    }

    channel.subscribe((msg) => {
        if(msg.name === 'new-order') {
            renderCard(msg.data, 'kitchen');
            if(document.getElementById('kitchen').classList.contains('active')) sndKitchen.play();
        } else if(msg.name === 'order-ready') {
            renderCard(msg.data, 'ready');
        }
    });

    function renderCard(data, target) {
        const list = document.getElementById(target + '-list');
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <span class="order-no">#${data.id}</span>
                <span style="font-size:20px; font-weight:bold;">🪑 طاولة ${data.table}</span>
            </div>
            <div class="items-list">${data.items}</div>
            <div style="text-align:left; color:#888; margin-bottom:10px;">🕒 ${data.time}</div>
            ${target === 'kitchen' 
                ? `<button class="btn-ready" onclick="markDone(this, ${JSON.stringify(data).replace(/"/g, '&quot;')})">تم التحضير ✅</button>`
                : `<button class="btn-ready" style="background:#333" onclick="this.parentElement.remove()">تسليم 🏁</button>`
            }
        `;
        list.prepend(card);
    }

    function markDone(btn, data) {
        channel.publish('order-ready', data);
        btn.parentElement.remove();
    }

    function clearUI() {
        currentItems = [];
        document.getElementById('tempOrder').innerText = "أختر الطلبات...";
        document.getElementById('tabNum').value = '';
    }

    function showView(v, btn) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
