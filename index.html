<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --bg: #0f141f; --key-bg: #1c2331; --key-text: #ffffff; --blue: #a0c3ff; --green: #00e676; --pink: #ff69b4; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر */
        .header { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .price { color: var(--green); font-size: 26px; font-weight: 900; }
        .table-tag { background: var(--pink); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* الطاولات */
        .tables { display: flex; overflow-x: auto; gap: 8px; padding: 10px; background: #000; }
        .t-btn { flex: 0 0 45px; height: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }
        .t-btn.active { background: var(--pink); color: #000; border-color: #fff; }

        /* شاشة العرض */
        .display { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 350px; }
        .input-view { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 20px; color: var(--blue); border: 1px solid #333; min-height: 50px; }
        .order-row { background: #1a202c; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; border-right: 4px solid var(--pink); }

        /* الكيبورد المثبت */
        .kb-container { position: fixed; bottom: 0; left: 0; right: 0; background: #080b12; padding: 5px; z-index: 1000; border-top: 1px solid #222; }
        .row { display: flex; justify-content: center; gap: 3px; margin-bottom: 5px; }
        .k { background: var(--key-bg); flex: 1; height: 52px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 20px; font-weight: 600; box-shadow: 0 2px 0 #000; }
        .k:active { background: #39445a; transform: translateY(2px); }
        .k-num { height: 38px; font-size: 15px; background: #2a344a; opacity: 0.8; }
        .k-wide { flex: 1.5; background: #3c4455; }
        .btn-add { background: var(--blue); color: #000; font-weight: 800; }
        .btn-send { background: var(--green); color: #000; font-weight: 900; height: 55px; }

        #kitchen { display: none; padding: 15px; }
        .k-card { background: #1a202c; border: 2px solid var(--pink); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="role-ui" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
    <h1 style="color:var(--pink)">الجوهرة 💎</h1>
    <button onclick="init('cashier')" style="width:70%; padding:20px; border-radius:15px; background:var(--pink); border:none; font-weight:bold;">دخول الكاشير</button>
    <button onclick="init('kitchen')" style="width:70%; padding:20px; border-radius:15px; background:none; border:2px solid #444; color:#fff;">دخول المطبخ</button>
</div>

<div id="cashier-ui" style="display:none; height:100%;">
    <div class="header">
        <div class="table-tag">طاولة: <span id="t-num">--</span></div>
        <div class="price"><span id="total">0</span> <small>د.ع</small></div>
    </div>
    <div class="tables" id="t-list"></div>
    <div class="display">
        <div class="input-view" id="view-text">أكتب الطلب...</div>
        <div id="basket"></div>
    </div>

    <div class="kb-container">
        <div class="row">
            <div class="k k-num" onclick="k('1')">1</div><div class="k k-num" onclick="k('2')">2</div><div class="k k-num" onclick="k('3')">3</div><div class="k k-num" onclick="k('4')">4</div><div class="k k-num" onclick="k('5')">5</div>
            <div class="k k-num" onclick="k('6')">6</div><div class="k k-num" onclick="k('7')">7</div><div class="k k-num" onclick="k('8')">8</div><div class="k k-num" onclick="k('9')">9</div><div class="k k-num" onclick="k('0')">0</div>
        </div>
        <div class="row">
            <div class="k" onclick="k('ض')">ض</div><div class="k" onclick="k('ص')">ص</div><div class="k" onclick="k('ث')">ث</div><div class="k" onclick="k('ق')">ق</div><div class="k" onclick="k('ف')">ف</div><div class="k" onclick="k('غ')">غ</div><div class="k" onclick="k('ع')">ع</div><div class="k" onclick="k('ه')">ه</div><div class="k" onclick="k('خ')">خ</div><div class="k" onclick="k('ح')">ح</div><div class="k" onclick="k('ج')">ج</div>
        </div>
        <div class="row">
            <div class="k" onclick="k('ش')">ش</div><div class="k" onclick="k('س')">س</div><div class="k" onclick="k('ي')">ي</div><div class="k" onclick="k('ب')">ب</div><div class="k" onclick="k('ل')">ل</div><div class="k" onclick="k('ا')">ا</div><div class="k" onclick="k('ت')">ت</div><div class="k" onclick="k('ن')">ن</div><div class="k" onclick="k('م')">م</div><div class="k" onclick="k('ك')">ك</div><div class="k" onclick="k('ط')">ط</div>
        </div>
        <div class="row">
            <div class="k k-wide" onclick="del()">⌫</div>
            <div class="k" onclick="k('ئ')">ئ</div><div class="k" onclick="k('ء')">ء</div><div class="k" onclick="k('ؤ')">ؤ</div><div class="k" onclick="k('ر')">ر</div><div class="k" onclick="k('ى')">ى</div><div class="k" onclick="k('ة')">ة</div><div class="k" onclick="k('و')">و</div><div class="k" onclick="k('ز')">ز</div><div class="k" onclick="k('ظ')">ظ</div><div class="k" onclick="k('د')">د</div><div class="k" onclick="k('ذ')">ذ</div>
        </div>
        <div class="row">
            <div class="k" onclick="k(' ')">مسافة</div>
            <div class="k btn-add" onclick="add()">إضافة وجبة +</div>
        </div>
        <div class="row">
            <button class="k btn-send" onclick="send()">إرسال الطلب للمطبخ 🚀</button>
        </div>
    </div>
</div>

<div id="kitchen" style="height:100%; overflow-y:auto;">
    <h2 style="text-align:center; color:var(--pink)">👨‍🍳 طلبات المطبخ</h2>
    <div id="k-cards"></div>
</div>

<script>
    const ably = new Ably.Realtime('Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU');
    const chan = ably.channels.get('jawhara-v150');
    let text = "", basket = [], total = 0, table = "";
    const prices = { "كص": 1500, "برجر": 2000, "لفه": 1000, "ببسي": 500 };

    function init(r) {
        document.getElementById('role-ui').style.display = 'none';
        if(r === 'cashier') {
            document.getElementById('cashier-ui').style.display = 'block';
            for(let i=1; i<=20; i++) {
                const b = document.createElement('div'); b.className = 't-btn'; b.innerText = i;
                b.onclick = () => { document.querySelectorAll('.t-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); table = i; document.getElementById('t-num').innerText = i; };
                document.getElementById('t-list').appendChild(b);
            }
        } else { document.getElementById('kitchen').style.display = 'block'; renderK(); }
    }

    function k(c) { if(text === "أكتب الطلب...") text = ""; text += c; document.getElementById('view-text').innerText = text; }
    function del() { text = text.slice(0, -1); document.getElementById('view-text').innerText = text || "أكتب الطلب..."; }

    function add() {
        if(!text || text === "أكتب الطلب...") return;
        let p = parseInt(text.match(/\d+/)) || 0;
        if(p === 0) for(let s in prices) { if(text.includes(s)) { p = prices[s]; break; } }
        basket.push({n: text, p: p}); total += p;
        const div = document.createElement('div'); div.className = 'order-row';
        div.innerHTML = `<span>${text}</span><b>${p.toLocaleString()}</b>`;
        document.getElementById('basket').prepend(div);
        document.getElementById('total').innerText = total.toLocaleString();
        text = ""; document.getElementById('view-text').innerText = "أكتب الطلب...";
    }

    function send() {
        if(!table || basket.length === 0) return;
        chan.publish('msg', { t: table, i: basket.map(x=>x.n).join(' + ') });
        basket = []; total = 0; text = ""; table = "";
        document.getElementById('total').innerText = "0"; document.getElementById('basket').innerHTML = "";
        document.getElementById('t-num').innerText = "--"; document.getElementById('view-text').innerText = "أكتب الطلب...";
        document.querySelectorAll('.t-btn').forEach(x=>x.classList.remove('active'));
    }

    chan.subscribe(m => { 
        let d = JSON.parse(localStorage.getItem('j_k') || '[]'); d.push(m.data);
        localStorage.setItem('j_k', JSON.stringify(d)); renderK(); 
    });

    function renderK() {
        const div = document.getElementById('k-cards'); if(!div) return; div.innerHTML = "";
        let d = JSON.parse(localStorage.getItem('j_k') || '[]');
        d.forEach((o, i) => {
            const card = document.createElement('div'); card.className = 'k-card';
            card.innerHTML = `<div style="color:var(--pink)">طاولة ${o.t}</div><div style="font-size:24px; margin:10px 0;">${o.i}</div><button onclick="done(${i})" style="width:100%; padding:10px; background:var(--green); border:none; border-radius:8px; font-weight:bold;">تجهيز ✅</button>`;
            div.prepend(card);
        });
    }

    function done(i) {
        let d = JSON.parse(localStorage.getItem('j_k') || '[]'); d.splice(i, 1);
        localStorage.setItem('j_k', JSON.stringify(d)); renderK();
    }
</script>
</body>
</html>
