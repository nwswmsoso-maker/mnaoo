<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; background: #000; text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; }
        .nav-bar { display: flex; background: #111; border-bottom: 1px solid #222; }
        .nav-item { flex: 1; padding: 15px; border: none; background: transparent; color: #555; font-weight: bold; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .container { flex: 1; overflow-y: auto; padding: 15px; }
        .view { display: none; }
        .view.active { display: block; }
        input#tabNum { width: 100%; background: #111; border: 1px solid #333; color: var(--gold); padding: 15px; border-radius: 10px; text-align: center; font-size: 22px; margin-bottom: 15px; outline: none; }
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item-btn { background: #1a1a1a; border: 1px solid #333; padding: 20px 5px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: bold; color: #ccc; }
        #orderSummary { background: #111; padding: 15px; border-radius: 10px; margin: 15px 0; color: var(--gold); text-align: center; font-weight: bold; min-height: 50px; }
        .btn-send { width: 100%; padding: 18px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; background: var(--gold); color: black; }
        .order-card { background: white; color: black; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-right: 8px solid var(--gold); }
        .card-items { font-size: 24px; font-weight: 900; margin: 10px 0; }
        .btn-done { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>الجوهرة POS</header>

<div class="nav-bar">
    <button class="nav-item active" onclick="showV('cashier', this)">🛒 الكاشير</button>
    <button class="nav-item" onclick="showV('kitchen', this)">👨‍🍳 المطبخ</button>
    <button class="nav-item" onclick="showV('ready', this)">✅ الجاهز</button>
</div>

<div class="container">
    <div id="cashier" class="view active">
        <input type="number" id="tabNum" placeholder="رقم الطاولة" inputmode="numeric">
        <div class="pos-grid">
            <div class="item-btn" onclick="add('ستربس')">🍗 ستربس</div>
            <div class="item-btn" onclick="add('برجر')">🍔 برجر</div>
            <div class="item-btn" onclick="add('كنتاكي')">🍗 كنتاكي</div>
            <div class="item-btn" onclick="add('صاج')">🌯 صاج</div>
            <div class="item-btn" onclick="add('بيتزا')">🍕 بيتزا</div>
            <div class="item-btn" onclick="add('فنجر')">🍟 فنجر</div>
            <div class="item-btn" onclick="add('بيبسي')">🥤 بيبسي</div>
            <div class="item-btn" onclick="add('ماء')">💧 ماء</div>
            <div class="item-btn" style="color:red" onclick="reset()">❌ مسح</div>
        </div>
        <div id="orderSummary">أختر الطلبات...</div>
        <button class="btn-send" onclick="send()">إرسال للمطبخ 🚀</button>
    </div>
    <div id="kitchen" class="view"><div id="k-list"></div></div>
    <div id="ready" class="view"><div id="r-list"></div></div>
</div>

<script>
    // جرس المطبخ الأصلي
    const bell = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');

    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-pos-v1');
    
    let currentItems = [];

    function add(item) {
        currentItems.push(item);
        document.getElementById('orderSummary').innerText = currentItems.join(' + ');
        // حركة "تفتيح" الصوت للمتصفح
        bell.play().then(() => { bell.pause(); bell.currentTime = 0; }).catch(()=>{});
    }

    function send() {
        const table = document.getElementById('tabNum').value;
        if(!table || currentItems.length === 0) return;

        channel.publish('new-order', { table: table, items: currentItems.join(' - ') });
        
        // دق الجرس عند الإرسال
        bell.play().catch(()=>{}); 
        reset();
    }

    channel.subscribe((msg) => {
        if(msg.name === 'new-order') {
            draw(msg.data, 'k');
            // الجرس يشتغل بالمطبخ
            if(document.getElementById('kitchen').classList.contains('active')) {
                bell.play().catch(()=>{});
            }
        } else if(msg.name === 'ready-order') {
            draw(msg.data, 'r');
            // الجرس يشتغل عند الكاشير من يجهز الطلب
            if(document.getElementById('cashier').classList.contains('active')) {
                bell.play().catch(()=>{});
            }
        }
    });

    function draw(d, target) {
        const list = document.getElementById(target + '-list');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div style="font-weight:bold; border-bottom:1px solid #eee;">طاولة ${d.table}</div>
            <div class="card-items">${d.items}</div>
            ${target === 'k' 
                ? `<button class="btn-done" onclick="finish(this, ${JSON.stringify(d).replace(/"/g, '&quot;')})">تم التجهيز</button>`
                : `<button class="btn-done" style="background:#555" onclick="this.parentElement.remove()">تسليم</button>`
            }
        `;
        list.prepend(card);
    }

    function finish(btn, d) {
        channel.publish('ready-order', d);
        btn.parentElement.remove();
    }

    function reset() {
        currentItems = [];
        document.getElementById('orderSummary').innerText = "أختر الطلبات...";
        document.getElementById('tabNum').value = '';
    }

    function showV(v, btn) {
        // أي ضغطة تفتح قفل الصوت
        bell.play().then(() => { bell.pause(); bell.currentTime = 0; }).catch(()=>{});
        
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
