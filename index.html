<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* شاشات البداية */
        #role-selector { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .role-btn { width: 85%; padding: 30px; border-radius: 20px; border: 2px solid var(--gold); background: #111; color: var(--gold); font-size: 24px; font-weight: bold; }

        header { padding: 12px; background: #000; text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; }
        .nav-bar { display: none; background: #111; border-bottom: 1px solid #222; }
        .nav-item { flex: 1; padding: 15px; border: none; background: transparent; color: #555; font-weight: bold; }
        .nav-item.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .container { padding: 15px; height: calc(100vh - 100px); overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* لوحة الجاهز */
        #ready-board { background: #111; border: 1px solid var(--green); padding: 10px; border-radius: 12px; margin-bottom: 15px; display: none; }
        .tag { background: var(--green); color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin: 5px; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* واجهة الكاشير */
        .section-title { color: var(--gold); font-size: 14px; margin: 10px 0; border-right: 3px solid var(--gold); padding-right: 8px; }
        input#tabNum { width: 100%; background: #000; border: 1px solid #333; color: var(--gold); padding: 15px; border-radius: 10px; text-align: center; font-size: 24px; outline: none; }
        .pos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .item-btn { background: #1a1a1a; border: 1px solid #333; padding: 15px 10px; border-radius: 12px; text-align: center; }
        .item-btn .n { display: block; font-weight: bold; font-size: 15px; color: #fff; }
        .item-btn .p { display: block; font-size: 12px; color: var(--gold); }

        #orderSummary { background: #0a0a0a; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px dashed #444; }
        #total-price { font-size: 22px; color: var(--green); font-weight: bold; text-align: center; display: block; margin-top: 5px; }

        .btn-send { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 20px; font-weight: bold; background: var(--gold); color: black; }

        /* سجل التسليم */
        .log-item { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 13px; color: #888; border-right: 3px solid var(--green); }

        /* كروت المطبخ */
        .order-card { background: white; color: black; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-right: 10px solid var(--gold); }
        .card-items { font-size: 26px; font-weight: 900; margin: 10px 0; }
        .card-total { background: #f9f9f9; padding: 5px; text-align: left; font-weight: bold; color: var(--red); border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="role-selector">
    <h1 style="color:var(--gold)">الجوهرة 💎</h1>
    <button class="role-btn" onclick="init('cashier')">🛒 واجهة الكاشير</button>
    <button class="role-btn" onclick="init('kitchen')">👨‍🍳 واجهة المطبخ</button>
</div>

<header id="h-title">الجوهرة POS</header>

<div id="nav" class="nav-bar">
    <button id="n-cashier" class="nav-item active" onclick="go('cashier')">🛒 الطلبات</button>
    <button id="n-kitchen" class="nav-item" onclick="go('kitchen')">👨‍🍳 المطبخ</button>
</div>

<div class="container">
    <div id="cashier" class="view">
        <div id="ready-board"><div id="ready-list-cashier"></div></div>

        <input type="number" id="tabNum" placeholder="رقم الطاولة" inputmode="numeric">
        
        <div class="section-title">الوجبات العائلية</div>
        <div class="pos-grid">
            <div class="item-btn" onclick="add('جامبو بلس 18', 40000)"> <span class="n">جامبو بلس 18</span> <span class="p">40,000</span> </div>
            <div class="item-btn" onclick="add('جامبو عائلي 15', 33000)"> <span class="n">جامبو عائلي 15</span> <span class="p">33,000</span> </div>
            <div class="item-btn" onclick="add('كودو دجاج 12', 30000)"> <span class="n">كودو دجاج 12</span> <span class="p">30,000</span> </div>
            <div class="item-btn" onclick="add('وجبة القرمشة 3', 9000)"> <span class="n">وجبة القرمشة 3</span> <span class="p">9,000</span> </div>
        </div>

        <div class="section-title">البرجر</div>
        <div class="pos-grid">
            <div class="item-btn" onclick="add('برجر كلاسيك', 6000)"> <span class="n">برجر كلاسيك</span> <span class="p">6,000</span> </div>
            <div class="item-btn" onclick="add('برجر دجاج', 5500)"> <span class="n">برجر دجاج</span> <span class="p">5,500</span> </div>
            <div class="item-btn" onclick="add('دبل برجر', 8000)"> <span class="n">دبل برجر</span> <span class="p">8,000</span> </div>
            <div class="item-btn" onclick="add('ستيك برجر', 8000)"> <span class="n">ستيك برجر</span> <span class="p">8,000</span> </div>
        </div>

        <div id="orderSummary">
            <div id="items-list" style="font-size:14px; color:#ccc">أختر الوجبات...</div>
            <div id="total-price">المجموع: 0 دينار</div>
        </div>
        
        <button class="btn-send" onclick="send()">إرسال للمطبخ 🚀</button>
        <button onclick="reset()" style="width:100%; background:none; border:none; color:var(--red); margin-top:10px;">❌ مسح الكل</button>

        <div id="delivery-history" style="margin-top:20px;"></div>
    </div>

    <div id="kitchen" class="view"><div id="k-list"></div></div>
</div>

<script>
    const bell = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-v16');
    
    let currentOrder = [];
    let totalPrice = 0;
    let role = '';

    function init(r) {
        role = r;
        bell.play().then(() => { bell.pause(); bell.currentTime = 0; });
        document.getElementById('role-selector').style.display = 'none';
        document.getElementById('nav').style.display = 'flex';
        if(role === 'kitchen') { document.getElementById('n-cashier').style.display = 'none'; go('kitchen'); }
        else { document.getElementById('n-kitchen').style.display = 'none'; go('cashier'); }
    }

    function add(name, price) {
        currentOrder.push(name);
        totalPrice += price;
        updateUI();
    }

    function updateUI() {
        document.getElementById('items-list').innerText = currentOrder.join(' + ');
        document.getElementById('total-price').innerText = "المجموع: " + totalPrice.toLocaleString() + " دينار";
    }

    function send() {
        const t = document.getElementById('tabNum').value;
        if(!t || currentOrder.length === 0) return;
        channel.publish('msg', { type: 'new', table: t, items: currentOrder.join(' - '), total: totalPrice.toLocaleString() });
        bell.play().catch(()=>{});
        reset();
    }

    channel.subscribe((msg) => {
        const d = msg.data;
        if(d.type === 'new' && role === 'kitchen') { drawKitchen(d); bell.play().catch(()=>{}); }
        else if(d.type === 'ready' && role === 'cashier') { addToReadyBoard(d.table); bell.play().catch(()=>{}); }
    });

    function drawKitchen(d) {
        const list = document.getElementById('k-list');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div style="font-weight:bold; font-size:20px;">طاولة ${d.table}</div>
            <div class="card-items">${d.items}</div>
            <div class="card-total">الحساب: ${d.total} د.ع</div>
            <button class="btn-done" onclick="markReady(this, '${d.table}')">تم التجهيز ✅</button>
        `;
        list.prepend(card);
    }

    function markReady(btn, table) {
        channel.publish('msg', { type: 'ready', table: table });
        btn.parentElement.remove();
    }

    function addToReadyBoard(table) {
        document.getElementById('ready-board').style.display = 'block';
        const list = document.getElementById('ready-list-cashier');
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.innerText = "طاولة " + table + " جاهزة";
        tag.onclick = function() { 
            this.remove(); 
            const log = document.getElementById('delivery-history');
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span>طاولة ${table} تم التسليم</span> <span>${new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span>`;
            log.prepend(item);
            if(list.children.length === 0) document.getElementById('ready-board').style.display = 'none';
        };
        list.appendChild(tag);
    }

    function reset() { currentOrder = []; totalPrice = 0; updateUI(); document.getElementById('tabNum').value = ''; }

    function go(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        document.getElementById('n-' + v).classList.add('active');
    }
</script>
</body>
</html>
