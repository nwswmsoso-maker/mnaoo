<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الجوهرة 💎 - النسخة المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #0d0d0d; --white: #ffffff; --dark-grey: #1a1a1a; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 12px; background: var(--dark-grey); text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; }
        
        .mode-selector { display: flex; gap: 8px; padding: 10px; background: #222; }
        .mode-btn { flex: 1; padding: 12px; border: 2px solid var(--gold); background: transparent; color: var(--gold); border-radius: 8px; font-weight: bold; font-size: 14px; }
        .mode-btn.active { background: var(--gold); color: black; }

        .view { display: none; flex: 1; padding: 15px; overflow-y: auto; }
        .view.active { display: flex; flex-direction: column; }

        /* تنسيق الكاشير الذكي */
        .menu-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .food-item { background: #333; border: 1px solid #444; color: white; padding: 12px 5px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.2s; }
        .food-item:active { background: var(--gold); color: black; transform: scale(0.95); }
        .food-item.drink { border-color: #3498db; color: #3498db; }
        
        #tabNum { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--gold); background: #000; color: #fff; text-align: center; font-size: 20px; }
        #orderTextarea { width: 100%; height: 80px; padding: 10px; border-radius: 10px; background: #111; color: var(--gold); border: 1px solid #444; margin-bottom: 10px; font-size: 16px; resize: none; }
        .btn-send { width: 100%; padding: 18px; border-radius: 15px; background: #28a745; color: white; font-weight: bold; font-size: 20px; border: none; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }

        /* تنسيق المطبخ */
        .order-card { background: white; color: black; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 12px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-done { width: 100%; background: #000; color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>نظام الجوهرة السحابي 💎</header>

<div class="mode-selector">
    <button id="btn-cashier" class="mode-btn active" onclick="switchView('cashier')">🛒 الكاشير</button>
    <button id="btn-kitchen" class="mode-btn" onclick="switchView('kitchen')">👨‍🍳 المطبخ</button>
</div>

<div id="cashier-view" class="view active">
    <input type="number" id="tabNum" placeholder="رقم الطاولة 🪑" inputmode="numeric">
    
    <label style="color:var(--gold); font-size:12px;">الوجبات الرئيسية:</label>
    <div class="menu-section">
        <div class="food-item" onclick="addToOrder('وجبة ستربس')">🍗 ستربس</div>
        <div class="food-item" onclick="addToOrder('وجبة برجر')">🍔 برجر</div>
        <div class="food-item" onclick="addToOrder('وجبة كنتاكي')">🍗 كنتاكي</div>
        <div class="food-item" onclick="addToOrder('صاج دجاج')">🌯 صاج دجاج</div>
        <div class="food-item" onclick="addToOrder('صاج لحم')">🌯 صاج لحم</div>
        <div class="food-item" onclick="addToOrder('بيتزا')">🍕 بيتزا</div>
    </div>

    <label style="color:var(--gold); font-size:12px;">إضافات ومشروبات:</label>
    <div class="menu-section">
        <div class="food-item drink" onclick="addToOrder('بيبسي')">🥤 بيبسي</div>
        <div class="food-item drink" onclick="addToOrder('سفن أب')">🥤 سفن</div>
        <div class="food-item drink" onclick="addToOrder('ماء')">💧 ماء</div>
        <div class="food-item" onclick="addToOrder('فنجر')">🍟 فنجر</div>
        <div class="food-item" onclick="addToOrder('كبة')">🧆 كبة</div>
        <div class="food-item" style="color:#e74c3c; border-color:#e74c3c" onclick="document.getElementById('orderTextarea').value = ''">❌ مسح</div>
    </div>

    <textarea id="orderTextarea" placeholder="الطلبات المختارة تظهر هنا..." readonly></textarea>
    <button class="btn-send" onclick="sendOrder()">إرسال للمطبخ 🚀</button>
</div>

<div id="kitchen-view" class="view">
    <div id="orders-list">
        <p style="text-align:center; color:#555; margin-top:50px;">بانتظار طلبات الزبائن...</p>
    </div>
</div>

<script>
    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('al-jawhara-orders');
    let currentView = 'cashier';

    function addToOrder(item) {
        const area = document.getElementById('orderTextarea');
        if(area.value.includes(item)) {
             // إذا موجود يضيف "مكرر" أو يكتفي بالتنبيه، هنا سنضيفه مرة ثانية بفاصلة
             area.value += " + " + item;
        } else {
             area.value += (area.value ? "، " : "") + item;
        }
    }

    channel.subscribe('new-order', (message) => {
        if (currentView === 'kitchen') {
            const data = message.data;
            const list = document.getElementById('orders-list');
            if(list.querySelector('p')) list.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <b style="font-size:20px;">🪑 طاولة ${data.table}</b>
                    <small style="color:red;">جديد 🔔</small>
                </div>
                <p style="font-size:22px; margin:15px 0; font-weight:bold; color:#000;">${data.items}</p>
                <button class="btn-done" onclick="completeOrder(this)">تم التجهيز ✅</button>
            `;
            list.prepend(card);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
        }
    });

    function sendOrder() {
        const table = document.getElementById('tabNum').value;
        const items = document.getElementById('orderTextarea').value;
        if(!table || !items) return alert("اختر الطاولة والأكل أولاً!");

        channel.publish('new-order', { table, items });
        alert("وصل الطلب للمطبخ! ✅");
        document.getElementById('orderTextarea').value = '';
        document.getElementById('tabNum').value = '';
    }

    function completeOrder(btn) {
        btn.parentElement.style.background = '#dff0d8';
        setTimeout(() => btn.parentElement.remove(), 500);
    }

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(view + '-view').classList.add('active');
        document.getElementById('btn-' + view).classList.add('active');
    }
</script>
</body>
</html>
