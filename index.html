<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: rgba(30, 30, 30, 0.8); }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* شريط الإشعار العلوي الذكي (بديل الـ alert المزعج) */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 30px; border-radius: 50px; font-weight: bold; z-index: 2000; transition: 0.5s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #toast.show { top: 20px; }

        header { padding: 15px; background: rgba(0,0,0,0.9); text-align: center; border-bottom: 1px solid #333; font-weight: bold; font-size: 18px; letter-spacing: 1px; }
        
        .nav-bar { display: flex; background: #111; padding: 5px; border-bottom: 1px solid #222; }
        .nav-item { flex: 1; padding: 15px; border: none; background: transparent; color: #555; font-weight: bold; font-size: 14px; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { flex: 1; overflow-y: auto; padding: 15px; background: radial-gradient(circle at top, #111, #050505); }
        .view { display: none; }
        .view.active { display: block; }

        /* واجهة الكاشير الراقية */
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .item-btn { background: var(--card); border: 1px solid #333; padding: 22px 5px; border-radius: 12px; text-align: center; font-size: 14px; font-weight: bold; transition: 0.2s; backdrop-filter: blur(5px); }
        .item-btn:active { background: var(--gold); color: black; }

        .summary-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid #222; }
        input#tabNum { width: 100%; background: #000; border: 1px solid #444; color: var(--gold); padding: 15px; border-radius: 12px; text-align: center; font-size: 24px; margin-bottom: 15px; outline: none; }
        #tempText { font-size: 16px; color: #888; margin-bottom: 15px; text-align: center; min-height: 24px; }

        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-send { background: var(--gold); color: black; }

        /* الكروت في المطبخ */
        .order-card { background: white; color: black; border-radius: 15px; padding: 18px; margin-bottom: 15px; border-right: 8px solid var(--gold); animation: popUp 0.3s ease; }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } }
        .card-no { background: #000; color: var(--gold); padding: 3px 10px; border-radius: 6px; font-weight: bold; margin-left: 10px; }
        .card-items { font-size: 22px; font-weight: bold; margin: 12px 0; line-height: 1.4; }
        .btn-done { background: #2ecc71; color: white; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; }

    </style>
</head>
<body>

<div id="toast">تم إرسال الطلب ✨</div>

<header>الجوهرة POS</header>

<div class="nav-bar">
    <button class="nav-item active" onclick="showV('cashier', this)">🛒 الكاشير</button>
    <button class="nav-item" onclick="showV('kitchen', this)">👨‍🍳 المطبخ</button>
    <button class="nav-item" onclick="showV('ready', this)">✅ الجاهز</button>
</div>

<div class="container">
    <div id="cashier" class="view active">
        <input type="number" id="tabNum" placeholder="رقم الطاولة" inputmode="numeric">
        <div class="pos-grid">
            <div class="item-btn" onclick="add('ستربس')">🍗 ستربس</div>
            <div class="item-btn" onclick="add('برجر')">🍔 برجر</div>
            <div class="item-btn" onclick="add('كنتاكي')">🍗 كنتاكي</div>
            <div class="item-btn" onclick="add('صاج')">🌯 صاج</div>
            <div class="item-btn" onclick="add('بيتزا')">🍕 بيتزا</div>
            <div class="item-btn" onclick="add('فنجر')">🍟 فنجر</div>
            <div class="item-btn" onclick="add('بيبسي')">🥤 بيبسي</div>
            <div class="item-btn" onclick="add('ماء')">💧 ماء</div>
            <div class="item-btn" style="color:red" onclick="reset()">❌ مسح</div>
        </div>
        <div class="summary-box">
            <div id="tempText">أختر الطلبات...</div>
            <button class="btn-main btn-send" onclick="send()">إرسال للمطبخ</button>
        </div>
    </div>

    <div id="kitchen" class="view"><div id="k-list"></div></div>
    <div id="ready" class="view"><div id="r-list"></div></div>
</div>

<script>
    // أصوات نظام خفيفة جداً (Beep)
    const audioSend = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'); 
    const audioIn = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');

    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const chan = ably.channels.get('jawhara-pro');
    
    let count = 1, current = [];

    function add(item) {
        current.push(item);
        document.getElementById('tempText').innerText = current.join(' + ');
        document.getElementById('tempText').style.color = 'var(--gold)';
    }

    function send() {
        const t = document.getElementById('tabNum').value;
        if(!t || current.length === 0) return;

        chan.publish('order', { id: count++, table: t, items: current.join(' - ') });
        
        // تأثيرات فورية
        audioSend.play();
        showToast("تم الإرسال للمطبخ 🚀");
        reset(); // تصفير الكاشير فوراً
    }

    chan.subscribe((m) => {
        if(m.name === 'order') {
            draw(m.data, 'k');
            if(document.getElementById('kitchen').classList.contains('active')) audioIn.play();
        } else if(m.name === 'ready') {
            draw(m.data, 'r');
            if(document.getElementById('ready').classList.contains('active')) audioIn.play();
        }
    });

    function draw(d, target) {
        const list = document.getElementById(target + '-list');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="card-no">#${d.id}</span>
                <span style="font-size:18px; font-weight:bold;">طاولة ${d.table}</span>
            </div>
            <div class="card-items">${d.items}</div>
            ${target === 'k' 
                ? `<button class="btn-done" onclick="finish(this, ${JSON.stringify(d).replace(/"/g, '&quot;')})">تم التجهيز</button>`
                : `<button class="btn-done" style="background:#555" onclick="this.parentElement.remove()">تسليم</button>`
            }
        `;
        list.prepend(card);
    }

    function finish(btn, d) {
        chan.publish('ready', d);
        btn.parentElement.remove();
    }

    function reset() {
        current = [];
        document.getElementById('tempText').innerText = "أختر الطلبات...";
        document.getElementById('tempText').style.color = "#888";
        document.getElementById('tabNum').value = '';
    }

    function showToast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt;
        t.className = 'show';
        setTimeout(() => t.className = '', 2000);
    }

    function showV(v, b) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        b.classList.add('active');
    }
</script>
</body>
</html>
