<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS الاحترافي 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --bg: #0a0e14; --key: #1c2331; --blue: #8ab4f8; --green: #00e676; --pink: #ff69b4; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* الهيدر */
        .header { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid #222; }
        .price-total { color: var(--green); font-size: 28px; font-weight: 900; }
        .table-info { background: var(--pink); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: bold; }

        /* منطقة الطلبات */
        .display-area { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 380px; }
        .preview-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; font-size: 20px; color: var(--blue); border: 1px dashed #444; margin-bottom: 10px; min-height: 50px; }
        .list-item { background: #161b22; padding: 10px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; border-right: 4px solid var(--pink); }

        /* الكيبورد - الترتيب المطلوب */
        .kb-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: #05070a; padding: 5px; border-top: 2px solid #222; z-index: 2000; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        .key { background: var(--key); flex: 1; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 19px; font-weight: 600; box-shadow: 0 2px 0 #000; }
        .key:active { background: #39445a; transform: translateY(2px); box-shadow: none; }
        
        .k-num { height: 35px; font-size: 14px; background: #252d3d; color: #8b949e; }
        .k-del { background: #3c4455; flex: 1.5; color: #ff6b6b; }
        .k-space { flex: 4; background: #3c4455; font-size: 14px; }
        .btn-add { background: var(--blue); color: #000; font-weight: 800; flex: 2; }
        .btn-send { background: var(--green); color: #000; font-weight: 900; height: 55px; width: 100%; border: none; border-radius: 8px; font-size: 20px; margin-top: 5px; }

        /* الطاولات */
        .tables-bar { display: flex; overflow-x: auto; gap: 8px; padding: 10px; background: #000; border-bottom: 1px solid #222; }
        .t-node { flex: 0 0 45px; height: 45px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #333; }
        .t-node.selected { background: var(--pink); color: #000; border-color: #fff; }
    </style>
</head>
<body>

<div id="role-screen" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
    <h1 style="color:var(--gold)">الجوهرة 💎</h1>
    <button onclick="entry('cashier')" style="width:80%; padding:20px; background:var(--pink); border-radius:15px; font-weight:900;">🛒 واجهة الكاشير</button>
    <button onclick="entry('kitchen')" style="width:80%; padding:20px; border:2px solid #333; color:#fff; border-radius:15px; background:none;">👨‍🍳 واجهة المطبخ</button>
</div>

<div id="cashier-ui" style="display:none; height:100%;">
    <div class="header">
        <div class="table-info">طاولة: <span id="t-active">--</span></div>
        <div class="price-total"><span id="total-val">0</span> <small>د.ع</small></div>
    </div>
    <div class="tables-bar" id="t-scroll"></div>
    <div class="display-area">
        <div class="preview-box" id="typing-view">أكتب الطلب...</div>
        <div id="order-basket"></div>
    </div>

    <div class="kb-fixed">
        <div class="kb-row">
            <div class="key k-num" onclick="press('1')">1</div><div class="key k-num" onclick="press('2')">2</div><div class="key k-num" onclick="press('3')">3</div><div class="key k-num" onclick="press('4')">4</div><div class="key k-num" onclick="press('5')">5</div>
            <div class="key k-num" onclick="press('6')">6</div><div class="key k-num" onclick="press('7')">7</div><div class="key k-num" onclick="press('8')">8</div><div class="key k-num" onclick="press('9')">9</div><div class="key k-num" onclick="press('0')">0</div>
        </div>
        <div class="kb-row">
            <div class="key" onclick="press('ج')">ج</div><div class="key" onclick="press('ح')">ح</div><div class="key" onclick="press('خ')">خ</div><div class="key" onclick="press('ه')">ه</div><div class="key" onclick="press('ع')">ع</div><div class="key" onclick="press('غ')">غ</div><div class="key" onclick="press('ف')">ف</div><div class="key" onclick="press('ق')">ق</div><div class="key" onclick="press('ث')">ث</div><div class="key" onclick="press('ص')">ص</div><div class="key" onclick="press('ض')">ض</div>
        </div>
        <div class="kb-row">
            <div class="key" onclick="press('ك')">ك</div><div class="key" onclick="press('م')">م</div><div class="key" onclick="press('ن')">ن</div><div class="key" onclick="press('ت')">ت</div><div class="key" onclick="press('ا')">ا</div><div class="key" onclick="press('ل')">ل</div><div class="key" onclick="press('ب')">ب</div><div class="key" onclick="press('ي')">ي</div><div class="key" onclick="press('س')">س</div><div class="key" onclick="press('ش')">ش</div>
        </div>
        <div class="kb-row">
            <div class="key k-del" onclick="rem()">⌫</div>
            <div class="key" onclick="press('د')">د</div><div class="key" onclick="press('ذ')">ذ</div><div class="key" onclick="press('ر')">ر</div><div class="key" onclick="press('ز')">ز</div><div class="key" onclick="press('و')">و</div><div class="key" onclick="press('ة')">ة</div><div class="key" onclick="press('ى')">ى</div><div class="key" onclick="press('ط')">ط</div><div class="key" onclick="press('ظ')">ظ</div>
        </div>
        <div class="kb-row">
            <div class="key k-space" onclick="press(' ')">مسافة</div>
            <div class="key btn-add" onclick="pushItem()">إضافة وجبة +</div>
        </div>
        <button class="btn-send" onclick="finalSend()">إرسال الطلب للمطبخ 🚀</button>
    </div>
</div>

<div id="kitchen-ui" style="display:none; padding:15px; height:100%; overflow-y:auto;">
    <h2 style="text-align:center; color:var(--pink)">👨‍🍳 طلبات المطبخ</h2>
    <div id="k-list"></div>
</div>

<script>
    const ably = new Ably.Realtime('Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU');
    const chan = ably.channels.get('jawhara-final');
    let msgSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    
    let text = "", basket = [], total = 0, table = "";
    const prices = { "كص": 1500, "برجر": 2000, "لفه": 1000, "ببسي": 500 };

    function playTap() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.05);
    }

    function entry(r) {
        document.getElementById('role-screen').style.display = 'none';
        if(r === 'cashier') {
            document.getElementById('cashier-ui').style.display = 'block';
            for(let i=1; i<=30; i++) {
                const b = document.createElement('div'); b.className = 't-node'; b.innerText = i;
                b.onclick = () => { 
                    playTap();
                    document.querySelectorAll('.t-node').forEach(x=>x.classList.remove('selected'));
                    b.classList.add('selected'); table = i; document.getElementById('t-active').innerText = i;
                };
                document.getElementById('t-scroll').appendChild(b);
            }
        } else { document.getElementById('kitchen-ui').style.display = 'block'; renderK(); }
    }

    function press(c) {
        playTap();
        if(text === "أكتب الطلب...") text = "";
        text += c; document.getElementById('typing-view').innerText = text;
    }

    function rem() {
        playTap();
        text = text.slice(0, -1);
        document.getElementById('typing-view').innerText = text || "أكتب الطلب...";
    }

    function pushItem() {
        playTap();
        if(!text || text === "أكتب الطلب...") return;
        let p = parseInt(text.match(/\d+/)) || 0;
        if(p === 0) for(let s in prices) { if(text.includes(s)) { p = prices[s]; break; } }
        basket.push({n: text, p: p}); total += p;
        const row = document.createElement('div'); row.className = 'list-item';
        row.innerHTML = `<span>${text}</span><b>${p.toLocaleString()}</b>`;
        document.getElementById('order-basket').prepend(row);
        document.getElementById('total-val').innerText = total.toLocaleString();
        text = ""; document.getElementById('typing-view').innerText = "أكتب الطلب...";
    }

    function finalSend() {
        if(!table || basket.length === 0) { alert("اختر طاولة وضف وجبة!"); return; }
        chan.publish('msg', { t: table, i: basket.map(x=>x.n).join(' + ') });
        msgSound.play().catch(()=>{});
        // مسح البيانات
        basket = []; total = 0; text = ""; table = "";
        document.getElementById('total-val').innerText = "0";
        document.getElementById('order-basket').innerHTML = "";
        document.getElementById('typing-view').innerText = "أكتب الطلب...";
        document.getElementById('t-active').innerText = "--";
        document.querySelectorAll('.t-node').forEach(x=>x.classList.remove('selected'));
    }

    chan.subscribe(m => {
        let d = JSON.parse(localStorage.getItem('j_v2') || '[]'); d.push(m.data);
        localStorage.setItem('j_v2', JSON.stringify(d));
        if(document.getElementById('kitchen-ui').style.display === 'block') {
            msgSound.play().catch(()=>{}); renderK();
        }
    });

    function renderK() {
        const div = document.getElementById('k-list'); if(!div) return; div.innerHTML = "";
        let d = JSON.parse(localStorage.getItem('j_v2') || '[]');
        d.forEach((o, i) => {
            const card = document.createElement('div');
            card.style = "background:#161b22; border:2px solid var(--pink); border-radius:15px; padding:15px; margin-bottom:10px;";
            card.innerHTML = `<div style="color:var(--pink); font-weight:bold;">طاولة ${o.t}</div><div style="font-size:24px; margin:10px 0;">${o.i}</div><button onclick="done(${i})" style="width:100%; padding:12px; background:var(--green); border:none; border-radius:8px; font-weight:bold;">تم التجهيز ✅</button>`;
            div.prepend(card);
        });
    }

    function done(i) {
        let d = JSON.parse(localStorage.getItem('j_v2') || '[]'); d.splice(i, 1);
        localStorage.setItem('j_v2', JSON.stringify(d)); renderK();
    }
</script>
</body>
</html>
