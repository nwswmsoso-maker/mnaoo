<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS Pro 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #ffbf00; --pink: #ff69b4; --bg: #0a0a0a; --card-bg: #161616; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* تنبيهات النظام */
        #alert-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--pink); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; z-index: 10000; display: none; box-shadow: 0 0 20px var(--pink); border: 2px solid #fff; }

        /* شاشة الاختيار */
        #role-selector { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 25px; }
        .role-btn { width: 85%; padding: 30px; border-radius: 20px; border: 2px solid var(--pink); background: #000; color: var(--pink); font-size: 24px; font-weight: 800; box-shadow: 0 0 15px var(--pink); }

        header { padding: 15px; background: #000; text-align: center; border-bottom: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); }
        header span { font-weight: 800; font-size: 20px; color: var(--gold); }
        
        .nav-bar { display: none; background: #000; border-bottom: 1px solid #222; }
        .nav-item { flex: 1; padding: 15px; border: none; background: transparent; color: #666; font-weight: bold; }
        .nav-item.active { color: var(--pink); border-bottom: 3px solid var(--pink); }

        .container { flex: 1; padding: 15px; overflow-y: auto; background: #0a0a0a; }
        .view { display: none; flex-direction: column; gap: 15px; }
        .view.active { display: flex; }

        /* المنيو */
        .section-title { color: var(--gold); font-size: 18px; font-weight: 700; margin: 10px 0; border-right: 4px solid var(--gold); padding-right: 10px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .menu-item-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        .img-container { width: 100%; height: 100px; background: #222; display: flex; align-items: center; justify-content: center; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .placeholder { position: absolute; font-size: 30px; }
        .item-details { padding: 10px; text-align: center; }
        .item-name { display: block; font-size: 13px; font-weight: 700; }
        .item-price { display: block; font-size: 12px; color: var(--gold); font-weight: 800; }

        /* الفاتورة */
        input#tabNum { width: 100%; background: #000; border: 2px solid var(--pink); color: var(--pink); padding: 15px; border-radius: 12px; text-align: center; font-size: 24px; font-weight: 800; box-shadow: 0 0 10px var(--pink); }
        #orderSummary { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px dashed var(--gold); }
        #total-price { font-size: 22px; color: var(--green); font-weight: 800; text-align: center; }
        .btn-send { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 18px; font-weight: 800; background: var(--gold); cursor: pointer; }

        /* الجاهز */
        #ready-pane { background: rgba(46, 204, 113, 0.1); border-radius: 12px; padding: 12px; border: 1px solid var(--green); display: none; }
        .ready-item { background: #000; padding: 10px; border-radius: 10px; border: 1px solid var(--green); display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }

        /* المطبخ */
        .order-card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 2px solid var(--pink); box-shadow: 0 0 15px var(--pink); margin-bottom: 15px; }
        .card-items { font-size: 30px; font-weight: 900; margin: 15px 0; }
        .btn-done { width: 100%; padding: 20px; background: var(--green); border: none; border-radius: 15px; font-weight: 800; font-size: 24px; box-shadow: 0 0 15px var(--green); }
    </style>
</head>
<body>

<div id="alert-box"></div>

<div id="role-selector">
    <h1 style="color:var(--gold)">الجوهرة 💎 NEON</h1>
    <button class="role-btn" onclick="init('cashier')">🛒 واجهة الكاشير</button>
    <button class="role-btn" onclick="init('kitchen')">👨‍🍳 واجهة المطبخ</button>
</div>

<header id="h-title"><span>الجوهرة POS Pro</span></header>

<div id="nav" class="nav-bar">
    <button id="n-cashier" class="nav-item active" onclick="go('cashier')">🛒 الطلبات</button>
    <button id="n-kitchen" class="nav-item" onclick="go('kitchen')">👨‍🍳 المطبخ</button>
</div>

<div class="container">
    <div id="cashier" class="view">
        <input type="number" id="tabNum" placeholder="رقم الطاولة" inputmode="numeric">
        
        <div id="ready-pane">
            <div style="color:var(--green); text-align:center; font-weight:bold; font-size:14px;">✅ طلبات جاهزة (اضغط تأكيد):</div>
            <div id="ready-list-cashier"></div>
        </div>

        <div class="section-title">الوجبات 🍗</div>
        <div class="menu-grid">
            <div class="menu-item-card" onclick="add('جامبو بلس 18', 40000)">
                <div class="img-container"><span class="placeholder">🍗</span><img src="https://images.unsplash.com/photo-1562967914-608f82629710?w=200"></div>
                <div class="item-details"><span class="item-name">جامبو بلس 18</span><span class="item-price">40,000 د.ع</span></div>
            </div>
            <div class="menu-item-card" onclick="add('جامبو عائلي 15', 33000)">
                <div class="img-container"><span class="placeholder">🍟</span><img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=200"></div>
                <div class="item-details"><span class="item-name">جامبو عائلي 15</span><span class="item-price">33,000 د.ع</span></div>
            </div>
        </div>

        <div class="section-title">البرجر 🍔</div>
        <div class="menu-grid">
            <div class="menu-item-card" onclick="add('برجر كلاسيك', 6000)">
                <div class="img-container"><span class="placeholder">🍔</span><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200"></div>
                <div class="item-details"><span class="item-name">برجر كلاسيك</span><span class="item-price">6,000 د.ع</span></div>
            </div>
            <div class="menu-item-card" onclick="add('دبل برجر', 8000)">
                <div class="img-container"><span class="placeholder">🍔</span><img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=200"></div>
                <div class="item-details"><span class="item-name">دبل برجر</span><span class="item-price">8,000 د.ع</span></div>
            </div>
        </div>

        <div id="orderSummary">
            <div id="items-list" style="text-align:center; color:#888; margin-bottom:10px;">أختر الوجبات...</div>
            <div id="total-price">المجموع: 0 دينار</div>
        </div>
        <button class="btn-send" onclick="sendOrder()">إرسال للمطبخ 🚀</button>
        <button onclick="clearOrder()" style="background:none; border:none; color:var(--red); width:100%; margin-top:10px; font-weight:bold;">❌ مسح</button>
    </div>

    <div id="kitchen" class="view"><div id="k-list"></div></div>
</div>

<script>
    const bell = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-v20-final');
    
    let currentOrder = [], totalPrice = 0, role = '';

    function init(r) {
        role = r;
        bell.play().then(() => { bell.pause(); }).catch(()=>{});
        document.getElementById('role-selector').style.display = 'none';
        document.getElementById('nav').style.display = 'flex';
        if(role === 'kitchen') { document.getElementById('n-cashier').style.display = 'none'; go('kitchen'); }
        else { document.getElementById('n-kitchen').style.display = 'none'; go('cashier'); }
    }

    function showMyAlert(msg) {
        const b = document.getElementById('alert-box');
        b.innerText = msg;
        b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 2000);
    }

    function add(name, price) {
        currentOrder.push(name);
        totalPrice += price;
        document.getElementById('items-list').innerText = currentOrder.join(' + ');
        document.getElementById('total-price').innerText = "المجموع: " + totalPrice.toLocaleString() + " دينار";
    }

    function sendOrder() {
        const t = document.getElementById('tabNum').value;
        if(!t || currentOrder.length === 0) return;
        channel.publish('msg', { table: t, items: currentOrder.join(' - '), total: totalPrice.toLocaleString() });
        bell.play().catch(()=>{});
        showMyAlert("تم إرسال الطلب للمطبخ 🚀");
        clearOrder();
    }

    channel.subscribe((msg) => {
        const d = msg.data;
        if(d.type === 'ready' && role === 'cashier') {
            document.getElementById('ready-pane').style.display = 'block';
            const list = document.getElementById('ready-list-cashier');
            const item = document.createElement('div');
            item.className = 'ready-item';
            item.innerHTML = `<span>طاولة ${d.table} جاهزة</span><button onclick="confirmDeliver(this)" style="background:var(--green); border:none; padding:8px; border-radius:8px; font-weight:bold;">تأكيد التسليم</button>`;
            list.appendChild(item);
            bell.play().catch(()=>{});
        } else if(!d.type && role === 'kitchen') {
            drawKitchen(d);
            bell.play().catch(()=>{});
        }
    });

    function confirmDeliver(btn) {
        btn.parentElement.remove();
        if(document.getElementById('ready-list-cashier').children.length === 0) document.getElementById('ready-pane').style.display = 'none';
        showMyAlert("تم تسليم الطلب ✅");
        bell.play().catch(()=>{});
    }

    function drawKitchen(d) {
        const list = document.getElementById('k-list');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div style="font-size:22px; font-weight:800; border-bottom:1px solid #333; padding-bottom:8px;">طاولة ${d.table}</div>
            <div class="card-items">${d.items}</div>
            <div style="color:var(--gold); font-weight:bold; margin-bottom:12px;">الحساب: ${d.total} د.ع</div>
            <button class="btn-done" onclick="markReady(this, '${d.table}')">✅ تم التجهيز</button>
        `;
        list.prepend(card);
    }

    function markReady(btn, table) {
        channel.publish('msg', { type: 'ready', table: table });
        btn.parentElement.remove();
    }

    function clearOrder() { currentOrder = []; totalPrice = 0; document.getElementById('items-list').innerText = "أختر الوجبات..."; document.getElementById('total-price').innerText = "المجموع: 0 دينار"; document.getElementById('tabNum').value = ''; }

    function go(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        document.getElementById('n-' + v).classList.add('active');
    }
</script>
</body>
</html>
