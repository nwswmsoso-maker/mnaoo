<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الجوهرة - الإدارة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-black: #1a1a1a;
            --gold: #d4af37;
            --gold-light: #f1d592;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--white);
        }

        /* --- الهيكل العام --- */
        .pane { flex: 1; display: flex; flex-direction: column; border: 1px solid var(--gold); }
        .header { 
            background: linear-gradient(145deg, #222, #000); 
            color: var(--gold); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid var(--gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* --- شاشة الكاشير (يمين) --- */
        #cashier-section { background: var(--royal-black); }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
        }

        .food-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .food-card:hover { border-color: var(--gold); transform: scale(1.05); background: #2a2a2a; }
        .food-card h4 { margin: 10px 0 5px; color: var(--gold-light); }
        .food-card p { color: #fff; font-weight: bold; margin: 0; font-size: 13px; }

        /* --- الفاتورة والوصل (يسار) --- */
        #bill-section { 
            width: 380px; 
            background: #fff; 
            color: #000; 
            padding: 20px; 
            position: relative;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        /* ✨ الختم الشفاف ✨ */
        #bill-section::before {
            content: "مطعم الجوهرة";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 50px;
            color: rgba(0, 0, 0, 0.05); /* شفاف جداً */
            border: 5px solid rgba(0, 0, 0, 0.05);
            padding: 10px;
            pointer-events: none;
            white-space: nowrap;
            font-weight: bold;
            z-index: 0;
        }

        .receipt-content { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; }
        .order-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 5px 0; }

        .btn-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        /* --- شاشة المطبخ (تظهر عند الطلب) --- */
        #kitchen-pane { background: #111; border-right: 2px solid var(--gold); }
        .kitchen-card {
            background: #222;
            border: 1px solid var(--gold);
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
        }
        .btn-done { background: #2ed573; color: #fff; border: none; padding: 5px 10px; cursor: pointer; float: left; }

        @media print {
            body * { visibility: hidden; }
            #bill-section, #bill-section * { visibility: visible; }
            #bill-section { position: absolute; left: 0; top: 0; width: 80mm; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

    <div class="pane" id="kitchen-pane">
        <div class="header">👨‍🍳 شاشة التحضير (المطبخ)</div>
        <div id="kitchen-list" style="overflow-y: auto;"></div>
    </div>

    <div class="pane" id="cashier-section">
        <div class="header">💎 قائمة مطعم الجوهرة الملكية</div>
        <div class="menu-grid">
            <div class="food-card" onclick="addItem('برجر لحم ملكي', 7500)"><h4>🍔 برجر لحم</h4><p>7,500 د.ع</p></div>
            <div class="food-card" onclick="addItem('زنكر حار سبايسي', 6500)"><h4>🍗 زنكر دجاج</h4><p>6,500 د.ع</p></div>
            <div class="food-card" onclick="addItem('ستربس 5 قطع', 8000)"><h4>🍟 ستربس</h4><p>8,000 د.ع</p></div>
            <div class="food-card" onclick="addItem('صاج دجاج عملاق', 5000)"><h4>🌯 صاج دجاج</h4><p>5,000 د.ع</p></div>
            <div class="food-card" onclick="addItem('صاج لحم', 6000)"><h4>🌯 صاج لحم</h4><p>6,000 د.ع</p></div>
            <div class="food-card" onclick="addItem('بيبسي بارد', 500)"><h4>🥤 بيبسي</h4><p>500 د.ع</p></div>
        </div>
    </div>

    <div id="bill-section">
        <div class="receipt-content">
            <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom: 10px;">
                <h2 style="margin:0">مطعم الجوهرة</h2>
                <small>للأكلات السريعة والراقية</small>
            </div>
            
            <div id="order-items-list" style="margin-top:20px; flex:1">
                </div>

            <div style="border-top: 2px solid #000; padding-top: 10px;">
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:20px;">
                    <span>المجموع:</span>
                    <span id="total-price">0 د.ع</span>
                </div>
                <button class="btn-gold no-print" onclick="sendOrder()" style="width:100%">إرسال وطباعة 🖨️</button>
            </div>
        </div>
    </div>

    <script>
        let currentOrder = [];

        function addItem(name, price) {
            currentOrder.push({name, price});
            renderBill();
        }

        function renderBill() {
            const list = document.getElementById('order-items-list');
            list.innerHTML = '';
            let total = 0;
            currentOrder.forEach(item => {
                total += item.price;
                list.innerHTML += `<div class="order-item"><span>${item.name}</span> <b>${item.price.toLocaleString()}</b></div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString() + " د.ع";
        }

        function sendOrder() {
            if(currentOrder.length === 0) return alert("السلة فارغة!");

            // إضافة الطلب لشاشة المطبخ محلياً للتجربة
            const kList = document.getElementById('kitchen-list');
            const orderId = Date.now();
            const card = document.createElement('div');
            card.className = 'kitchen-card';
            card.id = `order-${orderId}`;
            card.innerHTML = `
                <div style="color:var(--gold)">طلب جديد #${orderId.toString().slice(-4)}</div>
                <ul style="padding-right:20px">
                    ${currentOrder.map(i => `<li>${i.name}</li>`).join('')}
                </ul>
                <button class="btn-done" onclick="document.getElementById('order-${orderId}').remove()">تم ✅</button>
                <div style="clear:both"></div>
            `;
            kList.prepend(card);

            // تفعيل الطباعة
            window.print();

            // تصفير الطلب
            currentOrder = [];
            renderBill();
        }
    </script>
</body>
</html>
