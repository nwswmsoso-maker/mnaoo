<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجوهرة POS Pro 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #ffbf00; --pink: #ff69b4; --bg: #0a0a0a; --card-bg: #161616; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        #alert-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--pink); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; z-index: 10000; display: none; }

        .top-price-badge { background: #000; border: 2px solid var(--green); border-radius: 20px; padding: 10px; margin-bottom: 10px; text-align: center; }
        .top-price-badge div { font-size: 24px; color: var(--green); font-weight: 900; }

        #role-selector { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 25px; }
        .role-btn { width: 85%; padding: 30px; border-radius: 20px; border: 2px solid var(--pink); background: #000; color: var(--pink); font-size: 24px; font-weight: 800; }

        header { padding: 10px; background: #000; text-align: center; border-bottom: 2px solid var(--gold); }
        
        .nav-bar { display: none; background: #000; border-bottom: 1px solid #222; }
        .nav-item { flex: 1; padding: 15px; border: none; background: transparent; color: #666; font-weight: bold; }
        .nav-item.active { color: var(--pink); border-bottom: 3px solid var(--pink); }

        .container { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; }
        .view { display: none; flex-direction: column; gap: 10px; width: 100%; }
        .view.active { display: flex; }

        /* خانة التسليم بالكاشير */
        #ready-pane { background: rgba(46, 204, 113, 0.1); border-radius: 15px; padding: 10px; border: 2px solid var(--green); display: none; margin-bottom: 10px; }
        .ready-item { background: #000; padding: 8px; border-radius: 10px; border: 1px solid var(--green); display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }

        /* الكيبورد */
        .keypad-container { background: var(--card-bg); padding: 10px; border-radius: 15px; border: 1px solid var(--pink); margin-bottom: 10px; }
        .keypad-scroll { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
        .key-btn { flex: 0 0 55px; height: 55px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .key-btn.selected { background: var(--pink); color: #000; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .menu-item-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #333; cursor: pointer; text-align: center; }
        .img-box { height: 70px; display: flex; align-items: center; justify-content: center; font-size: 35px; background: #111; }
        .item-details { padding: 5px; font-size: 13px; }

        .btn-send { width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 20px; font-weight: 800; background: var(--gold); margin-top: 15px; box-shadow: 0 0 15px var(--gold); }

        /* بطاقات المطبخ */
        .order-card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 2px solid var(--pink); margin-bottom: 15px; width: 100%; }
        .card-items { font-size: 28px; font-weight: 900; margin: 15px 0; color: #fff; }
        .btn-done { width: 100%; padding: 15px; background: var(--green); border: none; border-radius: 12px; font-weight: 800; font-size: 20px; }
    </style>
</head>
<body>

<div id="alert-box"></div>

<div id="role-selector">
    <h1 style="color:var(--gold)">الجوهرة 💎</h1>
    <button class="role-btn" onclick="init('cashier')">🛒 واجهة الكاشير</button>
    <button class="role-btn" onclick="init('kitchen')">👨‍🍳 واجهة المطبخ</button>
</div>

<header><span>الجوهرة POS Pro</span></header>

<div id="nav" class="nav-bar">
    <button id="n-cashier" class="nav-item" onclick="go('cashier')">🛒 الكاشير</button>
    <button id="n-kitchen" class="nav-item" onclick="go('kitchen')">👨‍🍳 المطبخ</button>
</div>

<div class="container">
    <div id="cashier" class="view">
        <div class="top-price-badge"><div>الحساب: <span id="top-total">0</span> د.ع</div></div>
        
        <div id="ready-pane">
            <div style="color:var(--green); text-align:center; font-size:12px;">✅ طلبات جاهزة:</div>
            <div id="ready-list-cashier"></div>
        </div>

        <div class="keypad-container"><div class="keypad-scroll" id="keypad"></div></div>

        <div class="menu-grid">
            <div class="menu-item-card" onclick="add('جامبو بلس 18', 40000)"><div class="img-box">🍗</div><div class="item-details">جامبو بلس 18<br><b style="color:var(--gold)">40,000</b></div></div>
            <div class="menu-item-card" onclick="add('جامبو عائلي 15', 33000)"><div class="img-box">🍟</div><div class="item-details">جامبو عائلي 15<br><b style="color:var(--gold)">33,000</b></div></div>
            <div class="menu-item-card" onclick="add('كودو دجاج 12', 30000)"><div class="img-box">🥪</div><div class="item-details">كودو دجاج 12<br><b style="color:var(--gold)">30,000</b></div></div>
            <div class="menu-item-card" onclick="add('برجر كلاسيك', 6000)"><div class="img-box">🍔</div><div class="item-details">برجر كلاسيك<br><b style="color:var(--gold)">6,000</b></div></div>
            <div class="menu-item-card" onclick="add('وجبة القرمشة 3', 9000)"><div class="img-box">🍗</div><div class="item-details">قرمشة 3<br><b style="color:var(--gold)">9,000</b></div></div>
            <div class="menu-item-card" onclick="add('برجر دجاج', 5500)"><div class="img-box">🍔</div><div class="item-details">برجر دجاج<br><b style="color:var(--gold)">5,500</b></div></div>
            <div class="menu-item-card" onclick="add('دبل برجر', 8000)"><div class="img-box">🍔</div><div class="item-details">دبل برجر<br><b style="color:var(--gold)">8,000</b></div></div>
            <div class="menu-item-card" onclick="add('ستيك برجر', 8000)"><div class="img-box">🥩</div><div class="item-details">ستيك برجر<br><b style="color:var(--gold)">8,000</b></div></div>
        </div>

        <div id="orderSummary" style="background:#111; padding:10px; margin-top:10px; border-radius:10px; text-align:center;">
            <div id="items-list" style="color:#888; font-size:14px;">أختر الوجبات...</div>
        </div>
        <button class="btn-send" onclick="sendOrder()">إرسال للمطبخ 🚀</button>
        <button onclick="clearOrder()" style="color:var(--red); background:none; border:none; width:100%; margin-top:10px; font-weight:bold;">❌ مسح</button>
    </div>

    <div id="kitchen" class="view">
        <div id="k-list"></div>
    </div>
</div>

<script>
    const bell = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    const ABLY_KEY = 'Uat5MQ.8fnfXA:4qRiadsaKzzjAcUOHdzkkQ8yxlgSY-u6c2TsELShwRU';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('jawhara-v50');

    let currentOrder = [], totalPrice = 0, role = '', selectedTable = '';
    let kitchenOrders = [], readyOrders = [];

    function saveState() {
        localStorage.setItem('jawhara_kitchen_v50', JSON.stringify(kitchenOrders));
        localStorage.setItem('jawhara_ready_v50', JSON.stringify(readyOrders));
    }

    function init(r) {
        role = r;
        document.getElementById('role-selector').style.display = 'none';
        document.getElementById('nav').style.display = 'flex';
        
        kitchenOrders = JSON.parse(localStorage.getItem('jawhara_kitchen_v50') || '[]');
        readyOrders = JSON.parse(localStorage.getItem('jawhara_ready_v50') || '[]');

        if(role === 'cashier') {
            generateKeypad();
            go('cashier');
            renderReadyOrders();
        } else {
            go('kitchen');
            renderKitchenOrders();
        }
    }

    function generateKeypad() {
        const kp = document.getElementById('keypad');
        kp.innerHTML = "";
        for(let i=1; i<=50; i++) {
            const btn = document.createElement('div');
            btn.className = 'key-btn'; btn.innerText = i;
            btn.onclick = function() { selectTable(this, i); };
            kp.appendChild(btn);
        }
    }

    function selectTable(btn, num) {
        document.querySelectorAll('.key-btn').forEach(k => k.classList.remove('selected'));
        btn.classList.add('selected'); selectedTable = num;
    }

    function add(name, price) {
        currentOrder.push(name); totalPrice += price;
        document.getElementById('items-list').innerText = currentOrder.join(' + ');
        document.getElementById('top-total').innerText = totalPrice.toLocaleString();
    }

    function sendOrder() {
        if(!selectedTable || currentOrder.length === 0) return;
        channel.publish('msg', { table: selectedTable, items: currentOrder.join(' - ') });
        bell.play().catch(()=>{});
        clearOrder();
        showMyAlert("تم الإرسال ✅");
    }

    channel.subscribe((msg) => {
        const d = msg.data;
        if(d.type === 'ready') {
            readyOrders.push(d.table);
            saveState();
            if(role === 'cashier') renderReadyOrders();
            bell.play().catch(()=>{});
        } else if(!d.type) {
            kitchenOrders.push(d);
            saveState();
            if(role === 'kitchen') renderKitchenOrders();
            bell.play().catch(()=>{});
        }
    });

    function renderKitchenOrders() {
        const list = document.getElementById('k-list');
        list.innerHTML = "";
        kitchenOrders.forEach((order, index) => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `<div style="font-size:20px; color:var(--gold);">طاولة ${order.table}</div><div class="card-items">${order.items}</div><button class="btn-done" onclick="finishOrder(${index})">✅ جاهز</button>`;
            list.appendChild(card);
        });
    }

    function finishOrder(idx) {
        channel.publish('msg', { type: 'ready', table: kitchenOrders[idx].table });
        kitchenOrders.splice(idx, 1);
        saveState();
        renderKitchenOrders();
    }

    function renderReadyOrders() {
        const pane = document.getElementById('ready-pane');
        const list = document.getElementById('ready-list-cashier');
        list.innerHTML = "";
        if(readyOrders.length > 0) pane.style.display = 'block';
        else pane.style.display = 'none';

        readyOrders.forEach((t, i) => {
            const item = document.createElement('div');
            item.className = 'ready-item';
            item.innerHTML = `<span>طاولة ${t} جاهزة</span><button onclick="confirmReady(${i})" style="background:var(--green); border:none; padding:5px 10px; border-radius:8px; font-weight:bold;">تأكيد</button>`;
            list.appendChild(item);
        });
    }

    function confirmReady(i) {
        readyOrders.splice(i, 1);
        saveState();
        renderReadyOrders();
    }

    function clearOrder() {
        currentOrder = []; totalPrice = 0; selectedTable = '';
        document.getElementById('top-total').innerText = "0";
        document.getElementById('items-list').innerText = "أختر الوجبات...";
        document.querySelectorAll('.key-btn').forEach(k => k.classList.remove('selected'));
    }

    function go(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        if(document.getElementById('n-'+v)) document.getElementById('n-'+v).classList.add('active');
    }

    function showMyAlert(m) {
        const b = document.getElementById('alert-box');
        b.innerText = m; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 2000);
    }
</script>
</body>
</html>
