<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطعم الجوهرة - الربط السحابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #0d0d0d; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--black); color: white; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 15px; background: #1a1a1a; text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 20px; }
        .nav { display: flex; background: #222; }
        .nav button { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; }
        .nav button.active { color: var(--gold); border-bottom-color: var(--gold); }
        .page { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .page.active { display: block; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; text-align: center; font-size: 18px; }
        .btn-send { width: 100%; padding: 15px; border-radius: 12px; background: var(--gold); color: #000; font-weight: bold; font-size: 18px; cursor: pointer; border: none; }
        .order-card { background: white; color: black; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 10px solid var(--gold); animation: slide 0.3s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>مطعم الجوهرة 💎</header>

<div class="nav">
    <button id="t-pos" class="active" onclick="show('pos')">🛒 الكاشير</button>
    <button id="t-kds" onclick="show('kds')">👨‍🍳 المطبخ</button>
</div>

<div id="pos" class="page active">
    <input type="number" id="tabNum" placeholder="رقم الطاولة 🪑">
    <input type="text" id="orderItems" placeholder="شنو الطلبات؟ (مثلاً: 3 برجر)">
    <button class="btn-send" onclick="send()">إرسال للمطبخ 🚀</button>
</div>

<div id="kds" class="page">
    <div id="k-list">
        <p style="text-align:center; color:#555;">بانتظار وصول طلبات جديدة...</p>
    </div>
</div>

<script>
    // --- ربط مفاتيحك الخاصة ---
    const P_KEY = 'd238d41a6c3ba3b0f1d1'; 
    const P_CLUSTER = 'eu';

    // تشغيل Pusher
    const pusher = new Pusher(P_KEY, { cluster: P_CLUSTER, forceTLS: true });
    
    // ملاحظة: الـ Client Events تتطلب قناة تبدأ بـ 'private-'
    const channel = pusher.subscribe('private-orders');

    // 1. المطبخ يستلم الطلب
    channel.bind('client-new-order', function(data) {
        const list = document.getElementById('k-list');
        if(list.querySelector('p')) list.innerHTML = ''; // مسح النص الافتراضي

        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="font-size:20px;">طاولة ${data.table}</b>
                <span style="font-size:12px; color:#777;">الآن</span>
            </div>
            <p style="font-size:18px; margin:10px 0;">${data.items}</p>
            <button onclick="this.parentElement.remove()" style="width:100%; background:#2ed573; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">تم التحضير ✅</button>
        `;
        list.prepend(card);
        
        // صوت تنبيه عند وصول طلب
        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
    });

    // 2. الكاشير يرسل الطلب
    function send() {
        const table = document.getElementById('tabNum').value;
        const items = document.getElementById('orderItems').value;

        if(!table || !items) return alert("يرجى ملء رقم الطاولة والطلبات!");

        // إرسال الإشارة للسحاب فوراً
        const triggered = channel.trigger('client-new-order', { table: table, items: items });

        if(triggered) {
            alert("تم الإرسال للمطبخ بنجاح! ✨");
            document.getElementById('orderItems').value = '';
            document.getElementById('tabNum').value = '';
        } else {
            alert("حدث خطأ! تأكد من تفعيل 'Enable client events' في موقع Pusher.");
        }
    }

    // تنقل الصفحات
    function show(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('t-' + p).classList.add('active');
    }

    // وظيفة بسيطة للتعامل مع نظام الأمان في القنوات الخاصة (للتبسيط)
    pusher.connection.bind('connected', () => {
        console.log('مربوط بالسحاب بنجاح! ✅');
    });
</script>
</body>
</html>
