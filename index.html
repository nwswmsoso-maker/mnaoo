<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الجوهرة الملكي - ربط داخلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* نفس الستايل الملكي السابق */
        :root { --black: #0d0d0d; --gold: #d4af37; --white: #ffffff; --green: #2ed573; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--black); overflow: hidden; height: 100%; }
        header { height: 60px; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid var(--gold); }
        .logo { color: var(--gold); font-weight: bold; font-size: 20px; }
        .page { display: none; height: calc(100vh - 60px); overflow-y: auto; padding: 15px; }
        .page.active { display: block; }
        
        /* الكاشير */
        .food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 250px; }
        .food-item { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; color: white; }
        .cart-footer { position: fixed; bottom: 0; width: 100%; background: var(--white); padding: 15px; border-radius: 20px 20px 0 0; }
        .btn-send { background: var(--gold); border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* المطبخ */
        .order-card { background: white; color: black; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-right: 10px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .kitchen-stats { background: #111; color: var(--gold); padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <header>
        <div onclick="openPage('pos')" style="color:var(--gold); cursor:pointer;">🛒 كاشير</div>
        <div class="logo">الجوهرة 💎</div>
        <div onclick="openPage('kds')" style="color:var(--gold); cursor:pointer;">👨‍🍳 مطبخ</div>
    </header>

    <div id="pos" class="page active">
        <div class="food-grid">
            <div class="food-item" onclick="add('برجر', 7000)"> برجر 7,000</div>
            <div class="food-item" onclick="add('صاج', 5000)"> صاج 5,000</div>
            <div class="food-item" onclick="add('ستربس', 8000)"> ستربس 8,000</div>
            <div class="food-item" onclick="add('بيبسي', 500)"> بيبسي 500</div>
        </div>
        <div class="cart-footer">
            <input type="number" id="tab-num" placeholder="رقم الطاولة" style="width:100%; padding:10px; margin-bottom:10px; border:2px solid var(--gold); border-radius:8px; text-align:center;">
            <div id="total" style="font-weight:bold; margin-bottom:10px;">المجموع: 0 د.ع</div>
            <button class="btn-send" onclick="sendOrder()">إرسال للمطبخ 🚀</button>
        </div>
    </div>

    <div id="kds" class="page">
        <div class="kitchen-stats">طلبات قيد التحضير: <b id="k-count">0</b></div>
        <div id="k-display"></div>
    </div>

    <script>
        // --- سر الربط المباشر بين الصفحات بدون سيرفر ---
        const channel = new BroadcastChannel('jawhara_orders');
        let cart = [];
        let orders = JSON.parse(localStorage.getItem('orders')) || [];

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'kds') renderKitchen();
        }

        function add(n, p) { cart.push({n, p}); updateCart(); }
        function updateCart() {
            let t = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('total').innerText = "المجموع: " + t.toLocaleString() + " د.ع";
        }

        function sendOrder() {
            let tNum = document.getElementById('tab-num').value;
            if(!cart.length || !tNum) return alert("أدخل الطلب ورقم الطاولة!");

            const order = { id: Date.now(), table: tNum, items: cart };
            orders.push(order);
            
            // حفظ في ذاكرة المتصفح وإرسال إشارة لكل الصفحات المفتوحة
            localStorage.setItem('orders', JSON.stringify(orders));
            channel.postMessage({ type: 'NEW_ORDER', order });

            alert("تم الإرسال للمطبخ!");
            cart = []; updateCart(); document.getElementById('tab-num').value = "";
        }

        // الاستماع للإشارات القادمة من صفحات أخرى
        channel.onmessage = (event) => {
            if (event.data.type === 'NEW_ORDER' || event.data.type === 'RELOAD') {
                orders = JSON.parse(localStorage.getItem('orders')) || [];
                renderKitchen();
                if(event.data.type === 'NEW_ORDER') new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        };

        function renderKitchen() {
            const display = document.getElementById('k-display');
            display.innerHTML = '';
            document.getElementById('k-count').innerText = orders.length;
            orders.forEach((o, index) => {
                display.innerHTML += `
                    <div class="order-card">
                        <b>طاولة: ${o.table}</b>
                        <ul>${o.items.map(i => `<li>${i.n}</li>`).join('')}</ul>
                        <button onclick="finish(${index})" style="width:100%; background:green; color:white; border:none; padding:10px; border-radius:8px;">جاهز ✅</button>
                    </div>`;
            });
        }

        function finish(index) {
            orders.splice(index, 1);
            localStorage.setItem('orders', JSON.stringify(orders));
            channel.postMessage({ type: 'RELOAD' });
            renderKitchen();
        }

        window.onload = renderKitchen;
    </script>
</body>
</html>
