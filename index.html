<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الجوهرة الملكي - شاشة الطباخ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --black: #0d0d0d; --gold: #d4af37; --white: #ffffff; --green: #2ed573; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); font-family: 'Cairo', sans-serif; overflow: hidden; }

        header { 
            height: 60px; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: 2px solid var(--gold); z-index: 1000; position: relative;
        }
        .menu-btn { font-size: 28px; color: var(--gold); cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -10px; background: red; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; display: none; }
        .logo { color: var(--gold); font-weight: bold; font-size: 20px; }

        /* عداد المطبخ الكبير */
        .kitchen-stats {
            background: linear-gradient(135deg, #1a1a1a, #000);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .count-circle {
            background: var(--gold);
            color: #000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 22px;
            box-shadow: 0 0 10px var(--gold);
        }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100%;
            background: #111; border-left: 2px solid var(--gold); transition: 0.4s ease; z-index: 2000; padding-top: 60px;
        }
        .sidebar.active { right: 0; }
        .nav-link { padding: 18px 25px; color: var(--gold); font-weight: bold; border-bottom: 1px solid #222; cursor: pointer; display: block; }

        .page { display: none; height: calc(100vh - 60px); overflow-y: auto; padding: 15px; width: 100%; }
        .page.active { display: block; }

        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-bottom: 220px; }
        .food-item { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; color: white; }
        .food-item h4 { margin: 5px 0; color: var(--gold); }

        .cart-footer {
            position: fixed; bottom: 0; width: 100%; background: var(--white); color: #000;
            border-radius: 20px 20px 0 0; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 1500;
        }
        .table-input {
            width: 100%; padding: 10px; border: 2px solid var(--gold); border-radius: 8px;
            margin-bottom: 10px; font-family: 'Cairo'; font-weight: bold; text-align: center; font-size: 16px;
        }
        #cart-list { max-height: 60px; overflow-y: auto; margin-bottom: 5px; font-size: 14px; border-bottom: 1px solid #eee; }
        
        .btn-send {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000; border: none; width: 100%; padding: 14px; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        .order-card { 
            background: var(--white); color: #000; border-radius: 15px; padding: 20px; margin-bottom: 15px;
            border-right: 12px solid var(--gold); box-shadow: 0 4px 12px rgba(255,255,255,0.05);
        }
        .table-badge { background: #000; color: var(--gold); padding: 4px 12px; border-radius: 5px; font-size: 18px; float: left; }
        .order-card ul { padding-right: 25px; font-size: 20px; font-weight: 700; margin: 20px 0; }
        .btn-ready { background: var(--green); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; }

        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(46, 213, 115, 0.95); color: #fff; padding: 10px 25px;
            border-radius: 30px; font-weight: bold; z-index: 5000; display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleSidebar()">
            ☰ <span id="ready-badge" class="badge">0</span>
        </div>
        <div class="logo">مطعم الجوهرة 💎</div>
        <div style="width:30px"></div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="nav-link" onclick="openPage('pos')">🛒 كاشير المبيعات</div>
        <div class="nav-link" onclick="openPage('kds')">👨‍🍳 شاشة المطبخ</div>
        <div id="ready-list-sidebar" style="padding:15px; color:var(--green); font-size:14px; border-top:1px solid #222;"></div>
        <div class="nav-link" onclick="toggleSidebar()" style="color:#666; margin-top:30px;">✖ إغلاق</div>
    </div>

    <div id="toast" class="toast"></div>

    <div id="pos" class="page active">
        <div class="food-grid">
            <div class="food-item" onclick="add('برجر لحم', 7500)"><h4>🍔 برجر لحم</h4><b>7,500</b></div>
            <div class="food-item" onclick="add('زنكر دجاج', 6500)"><h4>🍗 زنكر دجاج</h4><b>6,500</b></div>
            <div class="food-item" onclick="add('صاج دجاج', 5000)"><h4>🌯 صاج دجاج</h4><b>5,000</b></div>
            <div class="food-item" onclick="add('ستربس ملكي', 8500)"><h4>🍟 ستربس</h4><b>8,500</b></div>
            <div class="food-item" onclick="add('صاج لحم', 6000)"><h4>🌯 صاج لحم</h4><b>6,000</b></div>
            <div class="food-item" onclick="add('بيبسي', 500)"><h4>🥤 بيبسي</h4><b>500</b></div>
        </div>

        <div class="cart-footer">
            <input type="number" id="table-num" class="table-input" placeholder="رقم الطاولة 🪑">
            <div id="cart-list"></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
                <span>إجمالي الحساب:</span>
                <span id="total">0 د.ع</span>
            </div>
            <button class="btn-send" onclick="sendOrder()">إرسال للمطبخ ✨</button>
        </div>
    </div>

    <div id="kds" class="page">
        <div class="kitchen-stats">
            <span style="color:var(--gold); font-weight:bold; font-size:18px;">الطلبات المنتظرة:</span>
            <div id="kitchen-count" class="count-circle">0</div>
        </div>
        
        <div id="kitchen-display"></div>
    </div>

    <script>
        let cart = [];
        let orders = [];
        let readyCount = 0;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleSidebar();
        }

        function add(n, p) { cart.push({n, p}); renderCart(); }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let t = 0;
            cart.forEach(i => { t += i.p; list.innerHTML += `<div style="display:flex; justify-content:space-between;"><span>- ${i.n}</span><span>${i.p.toLocaleString()}</span></div>`; });
            document.getElementById('total').innerText = t.toLocaleString() + " د.ع";
        }

        function sendOrder() {
            const tableNum = document.getElementById('table-num').value;
            if(!cart.length) return showToast("السلة فارغة!", "#ff4757");
            if(!tableNum) return showToast("يرجى إدخال رقم الطاولة!", "#ff4757");

            const id = Math.floor(1 + Math.random() * 99);
            orders.push({id, table: tableNum, items: [...cart]});
            renderKitchen();
            
            showToast(`تم إرسال طلب طاولة ${tableNum} 🚀`, "#2ed573");
            cart = []; renderCart();
            document.getElementById('table-num').value = '';
        }

        function renderKitchen() {
            const display = document.getElementById('kitchen-display');
            const counter = document.getElementById('kitchen-count');
            
            display.innerHTML = '';
            counter.innerText = orders.length; // تحديث العداد الرقمي للطباخ
            
            orders.forEach((o, index) => {
                display.innerHTML += `
                    <div class="order-card">
                        <span class="table-badge">طاولة ${o.table}</span>
                        <h3 style="margin-bottom:0">طلب #${o.id}</h3>
                        <ul>${o.items.map(i => `<li>${i.n}</li>`).join('')}</ul>
                        <button class="btn-ready" onclick="finishOrder(${index})">تم التحضير ✅</button>
                    </div>`;
            });
        }

        function finishOrder(index) {
            const order = orders[index];
            readyCount++;
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();

            document.getElementById('ready-badge').innerText = readyCount;
            document.getElementById('ready-badge').style.display = 'block';
            
            const sidebarList = document.getElementById('ready-list-sidebar');
            const item = document.createElement('div');
            item.style.cssText = "background:#1a1a1a; padding:10px; border-radius:8px; margin-bottom:5px; border:1px solid #2ed573;";
            item.innerHTML = `🔔 طلب طاولة <b>${order.table}</b> جاهز <button onclick="deliver(this)" style="float:left; background:var(--green); border:none; color:white; border-radius:4px; padding:2px 8px; cursor:pointer;">استلام</button><div style="clear:both"></div>`;
            sidebarList.appendChild(item);

            orders.splice(index, 1);
            renderKitchen();
        }

        function deliver(btn) {
            btn.parentElement.remove();
            readyCount--;
            document.getElementById('ready-badge').style.display = readyCount <= 0 ? 'none' : 'block';
            document.getElementById('ready-badge').innerText = readyCount;
        }

        function showToast(msg, color) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
